[project]
name = "betweenlines-canon"
version = "0.1.0"
description = "Shared Thema-based literary vocabulary for between-lines apps."
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["betweenlines_canon*"]

