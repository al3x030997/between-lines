      and structured language learning, for use with guidance by educators, parents or for self-learning, usually graded by
      language level - such as CEFR - and breadth of vocabulary. Use with: EDUCATIONAL PURPOSE 4* Qualifiers, and other Children’s
      and Teenage subject codes - YB*, YF* YN*, YX* or XQ* - to indicate if they are stories or general interest'
    parent: YPCK2
  YPCK9:
    name: 'Educational: Modern (non-native or second) languages: Literature studies'
    notes: 'Use for: educational material for the study of literature – fiction, prose, poetry, drama, etc – in a secondary
