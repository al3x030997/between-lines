      approach to explore topics for young people. Use with: YF* codes as appropriate, for example, YFG for science fiction
      or YFH* for fantasy stories about time travel, time loops, time slips, time machines, temporal loops, time portals etc,
      or YNH* for titles that explore the past and history using time travelling or characters that travel through time with
      the reader'
    parent: YNT
  YNU:
    name: 'Children’s / Teenage general interest: Humour and jokes'
    notes: 'Use with: other Y* codes and qualifiers if the title is a humorous or light-hearted title about a specific topic'
    parent: YN
  YNUC:
    name: 'Children’s / Teenage general interest: Humour: Funny cartoons and comic strips'
    notes: 'Use for: humorous comic strips, visual jokes, funnies or collections of funny cartoons aimed at children or teenagers.
      Prefer: X* codes with appropriate 5A* Qualifiers for all graphic novels, European or American style comic books, manga
      etc aimed at children or teenagers, NB: use X* codes for complete stories presented as sequential images or sequential
      art, See also: XA* XQ*'
    parent: YNU
  YNV:
    name: 'Children’s / Teenage general interest: Hobbies, quizzes, toys and games'
    notes: 'Use all YNV* codes with: other YN* codes as appropriate, with INTEREST 5H* qualifiers for titles linked to specific
      holidays or seasons and other qualifiers as appropriate and use with YZ* codes to indicate when the title is a non-book
      product, such as an actual game, toy or jigsaw puzzle. (More details of the non-book product would be sent in other
      metadata). NB: YNV* codes may be used with WD* codes to give more detail but if mixing YNV* codes with WD* codes, the
      YNV* code MUST be designated as the Main Subject and sent with a 5A* qualifier'
    parent: YN
  YNVD:
    name: 'Children’s / Teenage general interest: Toys'
    notes: 'Use all YNVD* codes for: works about toys, or featuring toys. Use with: YB*, YF*, YNP* as appropriate'
    parent: YNV
  YNVD1:
    name: 'Children’s / Teenage general interest: Dolls, figures and similar toys'
    notes: 'Also class here: puppets, action figures, toy soldiers, etc. Use with: YB*, YF*, YNP* as appropriate'
    parent: YNVD
  YNVD2:
    name: 'Children’s / Teenage general interest: Stuffed or soft toys'
    notes: 'Also class here: Teddy bears. Use with: YB*, YF*, YNP* as appropriate'
    parent: YNVD
  YNVD3:
    name: 'Children’s / Teenage general interest: Building bricks, blocks and construction toys'
    notes: 'Use with: YB*, YF*, YNP* as appropriate'
    parent: YNVD
  YNVM:
    name: Children’s / Teenage general interest: Games
    notes: 'Also class here: Indoor games, party games, board games, card games, educational games, traditional games, games
      of chance, games of skill, action and reflex games, strategy games, role-playing games dice games, chess etc'
    parent: YNV
  YNVP:
    name: 'Children’s / Teenage general interest: Puzzles and quizzes'
    notes: 'Also class here: number and word games, sudoku, crosswords, word searches, mazes, enigmas, riddles, brain teasers,
      travel puzzles, memory, logic puzzles, find the missing pieces, jigsaw puzzles. Use for: products where there is something
      to solve, an answer to be found, something to work out, etc, See also: YBGH'
    parent: YNV
  YNVU:
    name: 'Children’s / Teenage general interest: Computer and video games'
    notes: 'Also class here: gameplay guides'
    parent: YNV
  YNW:
    name: 'Children’s / Teenage general interest: Sports and outdoor recreation'
    notes: 'Also class here: sporting events, outdoor games and activities. Use with: other YNW* codes as appropriate. NB:
      YNW may be used with S* codes to indicate a particular sport if there is no more precise YNW code but if mixing YNW
      with S* codes, one Y* code MUST be designated as the Main Subject and sent with a 5A* code'
    parent: YN
  YNWA:
    name: 'Children’s / Teenage general interest: Sporting events'
    notes: 'Also class here: the Olympics and Paralympics, World Cups, World Championships, Regional championships or other
      kinds of sporting events, tournaments, etc. Use with: other YNW* codes as appropriate'
    parent: YNW
  YNWD:
    name: 'Children’s / Teenage general interest: Ball games and sports'
    notes: 'Also class here: all ball games not listed below, such as golf, field hockey, lacrosse, hurling, camogie, netball,
      rounders, etc. NB: YNWD may be used with SFF* codes to indicate a particular sport if there is no more precise YNW code
      but if mixing YNWD with SF* codes, one Y* code MUST be designated as the Main Subject and sent with a 5A* code, See
      also: YNWK'
    parent: YNW
  YNWD1:
    name: 'Children’s / Teenage general interest: Ball games and sports: Association football (Soccer)'
    parent: YNWD
  YNWD2:
    name: 'Children’s / Teenage general interest: Ball games and sports: American Football'
    parent: YNWD
  YNWD3:
    name: 'Children’s / Teenage general interest: Ball games and sports: Baseball and Softball'
