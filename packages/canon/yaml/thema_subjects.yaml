# Thema subject codes (fiction + children + memoir/poetry/plays)
# Source: EDItEUR Thema v1.6 (2025-04-10 English release).
# Do not edit by hand — regenerate via canon/_source/filter_thema.py.
# Local (non-Thema) additions live in canon/extensions.yaml.

codes:
  DC:
    name: Poetry / Poems
    notes: 'Use all DC* codes for: publications using any poetic device or in any verse form, including free verse, fixed
      verse, blank verse, and poems written in prose form or mixing prose and verse, such as prose poetry or rhymed prose.
      Use with: DNBL for biographies of poets. Use all DC* codes with: STYLE 6* Qualifiers as appropriate, or with FX* codes
      or other subject codes to indicate the main theme of the poetry or poems. Prefer: YDP for poetry and verse for children
      or teenagers, See also: YDP'
    parent: D
  DCA:
    name: Classic poetry / poems
    notes: 'Use for: poetry, poems or poetic works widely regarded or presented as ‘classic’ and typically, but not necessarily,
      published and in print for several decades. Use with: DCF or DCQ and DB* as appropriate'
    parent: DC
  DCC:
    name: Modern and contemporary poetry / poems
    notes: 'Use with: DCF or DCQ or DCR* as appropriate'
    parent: DC
  DCF:
    name: Poetry / poems by individual poets
    notes: 'Use with: DCA or DCC or DCR* as appropriate'
    parent: DC
  DCQ:
    name: Poetry anthologies (various poets)
    notes: 'Also class here: anthologies of poems by genre or by tradition. Use with: DCA or DCC or DCR* or FX* as appropriate;
      for anthologies by theme use with other subject codes; for anthologies by locality use with 5T* Literature of a country,
      territory or region Qualifiers only to indicate national context where significant, e.g. an anthology of the poetry
      of Australia or the poetry of Mexico; and use with TIME PERIOD 3* qualifiers for an anthology of a specific period,
      e.g. the Poetry of the 17th century; and use with LANGUAGE 2* Qualifiers only with poetry anthologies where the language
      of the poems is a key part of the content, e.g. an anthology of Anglo-Saxon poetry in both Anglo-Saxon and a modern
      translation, meant to be used for improving understanding of Anglo-Saxon, See also: DNT'
    parent: DC
  DCR:
    name: Poetry / poems by form or style
    notes: 'Use for: collections of poetry by single or multiple poets, where the form is one of the major aspects for classification
      or search. Use DCR with: 6* STYLE qualifiers for forms and styles that do not have a unique DCR* code. Use all DCR*
      codes with: other DC* or DB* codes as appropriate'
    parent: DC
  DCRB:
    name: 'Poetry / poems by form or style: Haiku'
    notes: 'Also class here: Senryu, Haikai'
    parent: DCR
  DCRC:
    name: 'Poetry / poems by form or style: Tanka'
    notes: 'Also class here: Kyoka, Waka'
    parent: DCR
  DCRG:
    name: 'Poetry / poems by form or style: Ghazal'
    parent: DCR
  DCRH:
    name: 'Poetry / poems by form or style: Calligram'
    parent: DCR
  DCRL:
    name: 'Poetry / poems by form or style: Limerick'
    parent: DCR
  DCRS:
    name: 'Poetry / poems by form or style: Sonnet'
    parent: DCR
  DD:
    name: Plays, playscripts, drama
    notes: 'Also class here: theatre scripts, scripts for musical theatre, for pantomimes, or for any dramatic performance.
      Use all DD* codes for: any work of drama originally intended for theatrical performance, anthologies of plays or dramatic
      works by individual or various writers. Use all DD* codes with: PLACE 1* and/or TIME PERIOD 3*, STYLE 6* Qualifiers
      where these aspects are particularly pertinent and significant; appropriate codes, including FX* codes, may be added
      after DD* codes to indicate specific central themes or topics in drama and theatre. DO NOT USE: Qualifiers to indicate
      when or where the work was published, See also: ATFD ATJD ATLD'
    parent: D
  DDA:
    name: Classic plays / drama
    notes: 'Use for: plays, drama or dramatic works widely regarded or presented as ‘classic’ and typically, but not necessarily,
      published and in print for several decades'
    parent: DD
  DDC:
    name: Modern and contemporary plays / drama
    parent: DD
  DDL:
    name: Comedic plays
    notes: 'Also class here: farce, entremés. Use for: different traditions of comedic theatre'
    parent: DD
  DDT:
    name: Tragic plays
    notes: 'Also class here: tragedies, revenge tragedy'
    parent: DD
  DDV:
    name: Monologues / Duologues
    parent: DD
  DN:
    name: Biography and non-fiction prose
    notes: 'Also class here: life-writing. Use all DN* codes with: another specific subject code where possible and appropriate,
      to give more detail of the main topic of the work, e.g. SFH Golf with DNBS or JW* with DNP for reportage from military
      conflicts, if appropriate, See also: FC'
    parent: D
  DNB:
    name: 'Biography: general'
    notes: 'Also class here: general biographical works where there is no more precise code or the person is known in multiple
      areas. Use with: other subject codes, if appropriate, to give detail of what type of biography, for example, the biography
      of a famous chef, use with WBB, for the biography of a cancer survivor use with VFJB3, with 5P* qualifiers for biographies
      of a person associated with a particular social or cultural background that is explored in the biography'
    parent: DN
  DNBA:
    name: 'Autobiography: general'
    notes: 'Also class here: general autobiographical works where there is no more precise code or the person is known in
      multiple areas. Use with: other subject codes, if appropriate, to give detail of what type of autobiography, with 5P*
      qualifiers for autobiographies of a person associated with a particular social or cultural background that is explored
      in the autobiography'
    parent: DNB
  DNBB:
    name: 'Biography: business and industry'
    notes: 'Also class here: biographical works about business leaders, CEOs, industrialists, entrepreneurs, company founders,
      innovators, financiers, etc. Use with: K* or T* codes, if appropriate, to give detail of what type of business or industry'
    parent: DNB
  DNBB1:
    name: 'Autobiography: business and industry'
    parent: DNBB
  DNBF:
    name: 'Biography: arts and entertainment'
    notes: 'Also class here: biographical works about those in the arts or in entertainment or associated media. Use with:
      other codes to give detail of what type of biography, for example, ATC and ATF for biographies of film actors, or ATJ
      for TV personalities, or AVP for musicians, AGB for artists, AKT and AKB for fashion designers, ATJS1 for reality TV
      celebrities, etc'
    parent: DNB
  DNBF1:
    name: 'Autobiography: arts and entertainment'
    parent: DNBF
  DNBG:
    name: 'Biography: social media / internet celebrities'
    notes: 'Also class here: biographical works about social media influencers, internet celebrities or stars, vloggers, micro-celebrities,
      net idols, or others who have acquired or developed their fame and notability via the internet, etc'
    parent: DNB
  DNBG1:
    name: 'Autobiography: social media / internet celebrities'
    parent: DNBG
  DNBH:
    name: 'Biography: historical, political and military'
    notes: 'Also class here: biographical works about Presidents, Prime or First ministers, heads of state, political leaders,
      politicians, political activists, holders of political office, military figures, or figures from history. Use with:
      other codes to give detail of what type of biography, for example, use with: TIME PERIOD 3* Qualifiers and N* codes
      for historical biographies or JW* or NHW* codes for military biographies, or JP* codes for political biographies'
    parent: DNB
  DNBH1:
    name: 'Autobiography: historical, political and military'
    parent: DNBH
  DNBL:
    name: 'Biography: writers'
    notes: 'Also class here: literary biography, biographies of novelists, poets, playwrights, journalists etc. Use with:
      other subject codes, if appropriate, to give detail of what type of biography'
    parent: DNB
  DNBL1:
    name: 'Autobiography: writers'
    notes: 'Also class here: literary autobiography, autobiographies of novelists, poets, playwrights, journalists etc'
    parent: DNBL
  DNBM:
    name: 'Biography: philosophy and social sciences'
    notes: 'Also class here: biographical works about philosophers, great thinkers, academics, lawyers, judges, historians,
      psychologists, economists, sociologists, geographers or those associated with any of the social sciences or humanities,
      including Law. Use with: other subject codes, if appropriate, to give detail of what type of biography, for example,
      with JM* for a psychologist or KC for an economist, or CF for linguists, etc'
    parent: DNB
  DNBM1:
    name: 'Autobiography: philosophy and social sciences'
    parent: DNBM
  DNBP:
    name: 'Biography: adventurers and explorers'
    notes: 'Also class here: biographical works about travellers, voyagers, wanderers, etc. Use with: other subject codes,
      if appropriate, to give detail of what type of biography'
    parent: DNB
  DNBP1:
    name: 'Autobiography: adventurers and explorers'
    parent: DNBP
  DNBR:
    name: 'Biography: royalty'
    notes: 'Also class here: biographical works about empresses, emperors, queens, kings, princesses, princes, sovereigns,
      monarchs, royal families or dynasties or others who are considered royal. Use with: PLACE 1* and TIME PERIOD 3* Qualifiers
      and N* codes for historical biographies, or JPHL codes for biographies about royals who are heads of state, etc'
    parent: DNB
  DNBR1:
    name: 'Autobiography: royalty'
    parent: DNBR
  DNBS:
    name: 'Biography: sport'
    notes: 'Also class here: biographical works about those associated with sports of any type. Use with: S* codes to indicate
      what area of sport the person or group is associated with'
    parent: DNB
  DNBS1:
    name: 'Autobiography: sport'
    parent: DNBS
  DNBT:
    name: 'Biography: science, technology and medicine'
    notes: 'Also class here: biographical works about those associated with any of the sciences, or technology or medicine.
      Use with: other subject codes, if appropriate, to give detail of what type of biography, for example, with PB for biographies
      of mathematicians, PN for chemists, TN* for engineers, MBD for a biography of a medical professional, etc'
    parent: DNB
  DNBT1:
    name: 'Autobiography: science, technology and medicine'
    parent: DNBT
  DNBX:
    name: 'Biography: religious and spiritual'
    notes: 'Also class here: biographical works about individuals or groups associated with a particular, faith, religion,
      belief system or spirituality. Use with: other subject codes, if appropriate, to give detail of what type of biography,
      for example, with QRMB1 for a biography of the Pope, or a QRJ* code for a biography of a rabbi, etc'
    parent: DNB
  DNBX1:
    name: 'Autobiography: religious and spiritual'
    parent: DNBX
  DNBZ:
    name: Collected biographies
    notes: 'Also class here: Collected obituaries, eulogies, collected biographical notices, collected lives, collected profiles
      of people, collected life stories or life histories, collected biographical essays from different domains, group biographies,
      etc. Use for: biographies of several people in single volume. Use with: appropriate DNB* code indicating area where
      possible, See also: GBCB'
    parent: DNB
  DNC:
    name: Memoirs
    notes: 'Also class here: Personal accounts, anecdotes or recollections of the subject‘s own real-life story. Use for:
      Memoirs are typically less structured and less encompassing than entire autobiographies, and are often about part of
      a life (e.g. childhood, a politician’s time in office) rather than one’s whole life. Use with: an autobiography code
      from the DNB* sequence above to indicate area where possible'
    parent: DN
  DND:
    name: Published diaries, letters and journals
    notes: 'Use for: works where diary or journal entries, or letters, are collected, including collected correspondence between
      more than one person, rather than the work being written specifically as an autobiography or memoir, or for works that
      are collections of things originally published on the internet or as modern, digital versions of journals or diaries
      such as a personal blog, or a series of emails. Use with: an autobiography code from the DNB* sequence above to indicate
      area where appropriate. DO NOT USE for: stationery, blank diaries, guided journals - always Prefer: WZ* codes for these'
    parent: DN
  DNG:
    name: Animal life stories
    notes: 'Also class here: biographies of specific animals, such as performing animals, racehorses, rescue animals etc'
    parent: DN
  DNL:
    name: Essays
    notes: 'Also class here: Collections of essays or individual essays. Use for: essays or causeries on literary subjects,
      essays on observations of daily life, recollections, and reflections of the author on different topics, essays as criticism
      or learned arguments, or political musings. Use with: other subject codes to classify collections of essays on a specific
      subject, e.g. essays on philosophy, economics, science, critiques, politics and society, etc'
    parent: DN
  DNP:
    name: Reportage, journalism or collected columns
    notes: 'Use for: works that are usually written in a journalistic style and that were either previously published in a
      news medium or published as original works. Use with: other appropriate subject codes to indicate the particular subject,
      for example with JP* codes for political or KC* codes for economic reportage or use on its own for more general works,
      See also: WTL* AJF'
    parent: DN
  DNPB:
    name: Interviews / discussions
    notes: 'Use for: works that are collections of interviews, or are presented as an interview, conversation or discussion
      between two or more people, or works that are recordings or podcasts of discussions, chats, interviews, debates, commentaries,
      etc'
    parent: DNP
  DNS:
    name: Speeches
    notes: 'Use for: collections of transcribed speeches. Use with: other code indicating subject where appropriate, See also:
      QRVH'
    parent: DN
  DNT:
    name: Anthologies
    notes: 'Use for: collections of literary works, usually chosen by the compiler, for example, a collection of short stories,
      novellas, or excerpts either by different authors or the same author, or around a particular topic or theme, collected
      posthumous writings from a literary estate, Nachlass. Use with: other code indicating subject or literary form where
      appropriate, for example, with F* codes for anthologies of works of fiction, DB* for anthologies of literature, XQ*
      for anthologies of comics, etc. Prefer: DCQ for anthologies of poetry, See also: DCQ'
    parent: DN
  DNX:
    name: True stories / true accounts of events
    notes: 'Also class here: first person true stories or personal accounts of specific events. Use all DNX* codes for: popular
      accounts of actual events written in a narrative or journalistic style, or for works where people talk about a specific
      event or episode from their own lived experience. Use with: other subject codes to give detail of the topic as appropriate'
    parent: DN
  DNXC:
    name: True crime
    notes: 'Use for: true accounts about real crimes, criminal acts, criminals, criminal organisations. Use with: JKV* codes
      to add more specific details of types of crime, for example, for a popular true crime account of criminal gangs, use
      with JKVM, or for a true crime account of a criminal fraud, use with JKVK, for biographies of criminals, outlaws, gangsters
      etc, with DNB, JBFK2 for true accounts of sexual assault, JPVR1 for political abduction or assassination, JKVN1 for
      kidnapping or hostage taking, NH* codes or 3* TIME PERIOD qualifiers for historical crime, etc'
    parent: DNX
  DNXC2:
    name: 'True crime: cold cases / long-unsolved crimes'
    notes: 'Also class here: accounts of crimes that were never solved by official investigations and that remain officially
      open or unsolved. Use with: other codes, especially JK* codes to indicate type of crime'
    parent: DNXC
  DNXC3:
    name: 'True crime: serial killers and murderers'
    notes: 'Also class here: accounts of mass murders, killing sprees, mass shootings, poisonings, stabbings, etc'
    parent: DNXC
  DNXH:
    name: True stories of discovery
    notes: 'Use for: discovery of a historical or scientific nature'
    parent: DNX
  DNXM:
    name: True war and combat stories
    parent: DNX
  DNXP:
    name: True stories of heroism, endurance and survival
    notes: 'Use for: primarily physical ordeals arising from misadventure, conflict, disasters etc, See also: DNXR'
    parent: DNX
  DNXR:
    name: True stories of survival of abuse and injustice
    notes: 'Also class here: Survivors’ stories, ‘misery memoirs’. Use for: physical or emotional ordeals arising from deliberate
      mistreatment, miscarriages of justice, victims of crime, etc. Prefer: DNXC for objective or criminal’s view of criminal
      activity, See also: DNXC DNXP'
    parent: DNX
  DNXZ:
    name: Erotic confessions and true stories
    notes: 'Also class here: sexual diaries or journals, erotica. Use for: True and real-life accounts and stories relating
      to sex, sexual practices, sexual encounters, erotic episodes or other true accounts of aspects of human sexuality. Use
      with: 5PRD for true stories about BDSM or other erotic subcultures and with INTEREST Qualifier 5X as appropriate'
    parent: DNX
  F:
    name: Fiction
    notes: 'Use all F* codes for: fictional stories, narratives or works of literature published as novels, novellas, short
      stories or in any other form. DO NOT USE: code ‘F’ itself, but select specific categories from section F*. Use all F*
      codes with: other subject categories and qualifiers where appropriate, in particular PLACE 1* and/or TIME PERIOD 3*
      Qualifiers where these aspects are particularly pertinent and significant. N.B. F* codes may be used with appropriate
      non-fiction categories to indicate key settings or topics of the narrative, but for all adult fiction the primary category
      must be an F* code. FX* codes may be used to indicate a strong underlying theme. Also use with 5H*, 5J*, 5L* or 5P*
      qualifiers when these represent a significant topic or part of the appeal of the narrative. FY* codes may be used to
      indicate special features of a fiction title'
    parent: null
  FB:
    name: 'Fiction: literary and general non-genre'
    notes: 'Also class here: Literary fiction. Use for: works of literary and general non-genre fiction where either the date
      is unknown or where neither ‘classic’ nor ‘contemporary’ are applicable. Use all FB* codes with: FX* or FY* codes to
      give greater detail about themes or features where applicable. FB* codes may be used as the main code with genre fiction
      codes where a literary novel is also considered to be a significant example of the genre. Prefer: FBA or FBC wherever
      appropriate, and prefer a genre fiction code as the main subject when this is more appropriate'
    parent: F
  FBA:
    name: 'Modern and contemporary fiction: literary and general'
    notes: 'Also class here: Contemporary literary fiction. Use for: works of literary and non-genre fiction first published
      in the last few decades. Use with: FX* or FY* codes to give greater detail about themes or features where applicable'
    parent: FB
  FBAN:
    name: Street fiction / urban fiction
    notes: 'Also class here: street lit, hip-hop fiction, ‘gritty drama’. Use for: stories, usually set in urban, inner-city
      enclaves, that are often dark, focusing on the underside of city life'
    parent: FBA
  FBC:
    name: 'Classic fiction: literary and general'
    notes: 'Also class here: Classic literary fiction. Use for: works of literary and general non-genre fiction widely regarded
      or presented as ‘classic’ and typically but not necessarily published and in print for several decades. Prefer: ‘classic’
      headings for genre fiction where available, See also: DBS* FFC FLC'
    parent: FB
  FC:
    name: Biographical fiction / autobiographical fiction
    notes: 'Also class here: fictional life writing, autobiographical stories, autofiction. Use for: highly fictionalised
      accounts of the lives of real people (including fictionalised autobiographies) or where an author is using fictionalised
      versions of real life memories or experiences from their own life as an integral and major part of the narrative or
      story. Use with: FV as appropriate, See also: DN*'
    parent: F
  FD:
    name: Speculative fiction
    notes: 'Use for: works of fiction that speculate about different realities from the actual recognisable world, or other
      worlds or universes, using elements of science, supernatural, paranormal, futuristic or other imaginative elements that
      are not part of everyday reality as a major theme of the story. Use all FD* codes with: other F* codes as appropriate,
      with 6JM - Indigenous Futurisms - for Indigenous speculative fiction, with other 5* INTEREST and 6* STYLE qualifiers
      for particular types of speculative fiction'
    parent: F
  FDB:
    name: Dystopian and utopian fiction
    notes: 'Use for: any fiction set in an ideal or utopian society, or a dysfunctional or degraded society. Use with: FL*
      or other F* codes as appropriate'
    parent: FD
  FDK:
    name: Alternative history fiction
    notes: 'Also class here: Uchronia. Use for: any work of speculative fiction, set in an imagined version of our world that
      might have emerged had key historical events happened differently e.g. outcome of WW2, or alternate history in which
      one or more historical events have occurred but are resolved differently than in actual history. Use with: FLG or other
      FL* codes for alternate history as science fiction stories that feature the tropes of time travel between histories,
      the psychic awareness of the existence of an alternative universe, by the inhabitants of a given universe; and time
      travel that divides history into various timestreams, cross-time stories, rival parallel time worlds, with FMH codes
      for historical fantasy based on an alternate history or historical divergences'
    parent: FD
  FDM:
    name: Black Speculative fiction
    notes: 'Use with: FL* for Black Science Fiction, or FK* or FM* or FN* codes as appropriate, with 6AR for Afrofuturism
      (African-American / Black American/ African diaspora speculative fiction), or with 6AS Africanfuturism (African speculative
      fiction) or with other subject codes or qualifiers as appropriate'
    parent: FD
  FDV:
    name: Metaphysical / philosophical fiction
    notes: 'Use for: fiction that explores, or is based on, some form of philosophy or system of thought, fiction where a
      significant portion of the content is devoted to the sort of questions normally addressed in philosophy'
    parent: FD
  FF:
    name: Crime and / or mystery fiction
    notes: 'Use all FF* codes for: Stories about crimes, or mysteries to be solved, locked room mysteries, whodunits, heists
      and capers novels, crime novels, detective stories, murder mysteries, cold cases, unsolved crimes, etc. Use all FF*
      codes with: other codes for different types of crime fiction that do not have a unique code, for example, with PLACE
      1* qualifiers for regional crime fiction, FK* for horror crime fiction, FL* for science fiction crime'
    parent: F
  FFC:
    name: Classic crime and mystery fiction
    notes: 'Also class here: Classic whodunit stories. Use for: works of crime fiction widely regarded or presented as ‘classic’
      and typically, but not necessarily, published and in print for several decades'
    parent: FF
  FFD:
    name: 'Crime and mystery: private investigator / amateur detectives'
    notes: 'Also class here: Amateur sleuths, religious sleuths, private investigators, silver-haired sleuths, accidental
      detectives. Use for: stories where the main investigator is not an official police or judicial investigator'
    parent: FF
  FFH:
    name: Historical crime and mysteries
    notes: 'Use for: contemporary mysteries set in past times, e.g. in Victorian, Medieval, Roman period. Use with: PLACE
      1* and/or TIME PERIOD 3 * Qualifiers to indicate setting as appropriate'
    parent: FF
  FFJ:
    name: 'Crime and mystery: cosy mystery'
    notes: 'Also class here: Cozy crime, cozies, Cottagecore crime, domestic mysteries, soft-boiled crime stories, pet mysteries,
      cats or dogs mysteries, cooking mysteries, academic cozies, craft or hobby mysteries, cozy silver-haired mysteries.
      Use for: mysteries set in rural or traditional communities featuring minimal violence and typically amateur sleuths'
    parent: FF
  FFK:
    name: Comical (humorous) crime and mystery
    notes: 'Also class here: Funny or comedic crime and mystery stories'
    parent: FF
  FFL:
    name: 'Crime and mystery: hard-boiled crime, noir fiction'
    notes: 'Also class here: Roman noir, domestic noir crime stories. Use for: crime or detective stories often featuring
      things like gritty urban settings, bleak landscapes, or places that have been broken or distorted by crime, morally
      compromised or complex protagonists, dark mysteries, or a bleak, pessimistic or dark outlook on human nature, pessimistic
      vision of a place. Use with: PLACE 1* qualifiers to indicate setting, for example, Nordic noir crime stories set in
      parts of Scandinavia, Mediterranean Noir, American Hardboiled, etc, See also: FHR'
    parent: FF
  FFP:
    name: 'Crime and mystery: police procedural'
    notes: 'Also class here: police and forensic investigation, judicial or detective investigators, undercover police operations,
      police stories, forensic pathologists, coroners, forensic anthropologists, crime scene investigators, covert policing,
      undercover cops, plainclothes detectives, etc'
    parent: FF
  FFS:
    name: 'Crime and mystery: women sleuths / detectives'
    notes: 'Use for: Crime or mysteries where the mystery is solved by a woman, and where the woman is the detective, investigator,
      police officer, or other person who investigates or solves the crime or mystery etc. Use with: other FF* codes to indicate
      the genre as appropriate'
    parent: FF
  FG:
    name: Sports fiction
    notes: 'Use with: S* codes to indicate specific sport featured'
    parent: F
  FH:
    name: Thriller / suspense fiction
    notes: 'Use all FH* codes for: conspiracy thrillers, disaster thrillers, Eco-thrillers, classic thrillers, assassination
      thrillers, vigilante justice thrillers, kidnapping or murder thrillers, domestic thrillers. Use all FH* codes with:
      other F* codes as appropriate for different types of thriller or suspense fiction that do not have a unique code, such
      as FL* for Sci-fi thrillers, FRM for Romantic thrillers, FK for Horror thrillers, FJM* for military thrillers, FV for
      historical thrillers, JBGX for thrillers about conspiracies, FXS for Social thrillers, FF* for crime thrillers'
    parent: F
  FHD:
    name: Espionage and spy thriller
    notes: 'Also class here: Spy novels, stories featuring cold war spies, secret agents, undercover agents, spy agencies
      or intelligence agencies, counter-intelligence, state intelligence services, intelligence officers, secret services,
      secret police, spying or intelligence gathering, assassins or assassination plots in the world of espionage, etc'
    parent: FH
  FHF:
    name: Financial / Corporate thrillers
    notes: 'Also class here: thrillers featuring white-collar crimes, crimes of corruption, fraud or greed. Use for: thrillers
      in which the financial system, the world of finance and money, the financial markets, the economy, big business, world
      of corporations, multinational or transnational business or corporations, financial professionals, business people,
      corporate bosses, wealthy business families or dynasties, or similar play a major role'
    parent: FH
  FHK:
    name: Technothriller
    notes: 'Also class here: Cyber thrillers. Use for: thrillers incorporating scientific, technological (including computing
      digital technologies, artificial intelligence), etc. elements as important parts of the narrative'
    parent: FH
  FHM:
    name: Medical thriller
    notes: 'Use for: thrillers that usually feature something used for medical purposes becoming a weapon or threat, such
      as a virus, often featuring medical practitioners as key characters, biological threats, pandemics, medical forensic
      practitioners, etc'
    parent: FH
  FHP:
    name: Political / legal thriller
    notes: 'Also class here: Courtroom drama thrillers, thrillers featuring lawyers, judges, prosecutors or other legal settings
      or roles, or politicians, the world of politics or political settings, including political plots, political assassinations,
      political conspiracies, political targeted killings, etc'
    parent: FH
  FHQ:
    name: Esoteric thriller
    notes: 'Also class here: Occult, supernatural, mystical thrillers, archaeological thrillers. Use for: thrillers featuring
      traditions of ancient, secret or esoteric knowledge, such as the Holy Grail, or thrillers with occult, supernatural
      or mystical themes, conspiracies around secret or occult organisations or structures, etc.'
    parent: FH
  FHR:
    name: 'Thriller: organised crime / gangland crime'
    notes: 'Use for: thrillers based around criminal organizations, the criminal underworld, the mob, the mafia, crime syndicates,
      criminal gangs, contract killers, hired killers, professional gunmen, assassins, hitmen or hitwomen, criminal gangs,
      criminal feuds, criminal families, gangland crimes, gangsters, gritty urban crime, etc, See also: FFL'
    parent: FH
  FHS:
    name: 'Thriller: serial killers'
    notes: 'Use for: thrillers based around mass murderers, serial killers, spree killings, thrill killers, angel of mercy
      or angel of death type killers, etc. Use with: FK* for horror stories that include serial killers'
    parent: FH
  FHT:
    name: 'Thriller: terrorism'
    notes: 'Use for: thrillers based around potential terrorist actions, acts of terrorism, terrorist plots, political terrorism,
      conspiracies to commit acts of terror, anti-terror plots, etc'
    parent: FH
  FHX:
    name: Psychological thriller
    notes: 'Also class here: Domestic thrillers. Use for: thrillers that deal with a psychological narrative, or are told
      from the viewpoint of psychologically stressed characters, or where the plot concentrates on investigations of the psychologies
      of the principal characters, thrillers that examine things like perception, reality, the mind, identity, existence or
      purpose, etc, See also: FXM'
    parent: FH
  FJ:
    name: Adventure / action fiction
    notes: 'Use all FJ* codes for: adventure stories, stories of exploration, classic adventure or action stories. Use for:
      works that primarily emphasise physical, and sometimes violent, action, that often have a sense of danger and are meant
      to give the reader a sense of excitement or adventure, See also: FH'
    parent: F
  FJD:
    name: Martial arts fiction
    notes: 'Also class here: wuxia, Bukyō. Use with: FM*, FV*, XQ* codes plus TIME PERIOD 3* Qualifiers as appropriate'
    parent: FJ
  FJH:
    name: Historical adventure fiction
    notes: 'Use for: adventure novels set in past times. Use with: PLACE 1* and/or TIME PERIOD 3* Qualifiers to indicate setting
      as appropriate. Prefer: specific FJM* code if applicable, See also: FJM'
    parent: FJ
  FJM:
    name: War, combat and military adventure fiction
    notes: 'Also class here: Special forces stories, historical military fiction. Use for: stories that primarily emphasise
      the action or adventure side of war or combat. Use with: PLACE 1* and/or TIME PERIOD 3* Qualifiers to indicate setting
      for historical war or combat fiction. Prefer: other F* codes and TIME PERIOD 3* qualifiers for works where war or conflict
      is part of the background of the story or that examine the impact of war but where the primary theme could not be seen
      as action or adventure'
    parent: FJ
  FJMC:
    name: Napoleonic War fiction
    notes: 'Also class here: stories set during the French Revolutionary Wars, the Coalition Wars, the Peninsular Wars, the
      War of 1812 or any other associated war or military campaign of this period. Use with: PLACE 1* and/or TIME PERIOD 3*
      Qualifiers to indicate setting as appropriate'
    parent: FJM
  FJMF:
    name: First World War fiction
    parent: FJM
  FJMS:
    name: Second World War fiction
    parent: FJM
  FJMV:
    name: Vietnam War fiction
    parent: FJM
  FJN:
    name: Sea stories
    notes: 'Also class here: naval and maritime fiction, nautical fiction. Use for: adventure or action stories featuring
      seafarers, pirates, sailors, fishermen and so on, or largely set at sea'
    parent: FJ
  FJW:
    name: 'Adventure fiction: Westerns'
    parent: FJ
  FK:
    name: Horror, ghost stories and supernatural fiction
    notes: 'Use all FK* codes for: monster literature, Lovecraftian horror, cosmic horror, Eldritch horror, psychological
      horror, folk horror, body horror, transformative gore, survival horror, haunted house horror, extreme horror, demonic
      horror or any stories that provoke or inspire feelings of dread, fear and terror, or are intended to disturb, frighten
      or scare, using psychological or supernatural elements, or any story that includes a ghost, or the possibility of ghosts,
      or a characters belief in ghosts. Use all FK* codes with: VXQ* codes if appropriate, for example with VXQG for ghost
      stories, VXQM2 for vampire, werewolf or shifter horror, VXQM3 for zombie horror, VXQM5 for demon horror, VXWT for stories
      featuring evil witches and other F* codes, for example, FU* Comedy horror, FL* for Horror Science fiction, FP for Erotic
      horror, FV for Historical Horror, FLQ or FDB for Post-Apocalyptic Horror, FF* or FH* for Crime horror or thrillers with
      a horror plot, FHX or FXM for Quiet or psychological horror, FYL for Gothic horror, or with 5* Qualifiers, for example,
      5HPD for Christmas Horror, 5HRD for Winter Horror, etc, See also: FMT FHX'
    parent: F
  FKC:
    name: Classic horror, ghost stories and supernatural fiction
    notes: 'Also class here: classic gothic horror. Use for: supernatural fiction, horror or ghost stories widely regarded
      or presented as ‘classic’ and typically, but not necessarily, published and in print for several decades'
    parent: FK
  FKM:
    name: Contemporary horror, ghost stories and supernatural fiction
    notes: 'Use for: supernatural fiction, horror or ghost stories set in the present day or contemporary settings, typically
      first published in the last few decades'
    parent: FK
  FKW:
    name: Occult fiction / Paranormal Horror
    notes: 'Use for: works where major themes of the story deal with the darker side of witchcraft, spiritualism, psychic
      phenomena, demonic possession, satanism, mysterious or secret knowledge, or other paranormal phenomenon'
    parent: FK
  FL:
    name: Science fiction
    notes: 'Use all FL* codes with: other subjects codes or qualifiers for different types of SF that do not have a unique
      code, for example, FU for Comical (humorous) science fiction, Sci-fi comedy, 5PS for LGBTQIA+ science fiction, 6JM for
      Indigenous Futurisms in SF, with 6AR for Afrofuturism (African-American / Black American / African diaspora SF), or
      with 6AS Africanfuturism (African) in SF, FK* for Science fiction with horror stories, See also: FD FDM'
    parent: F
  FLC:
    name: Classic science fiction
    notes: 'Use for: science fiction widely regarded or presented as ‘classic’ and typically, but not necessarily, published
      and in print for several decades'
    parent: FL
  FLG:
    name: 'Science fiction: time travel / time slip'
    notes: 'Also class here: Chuanyue, Isekai, stories based on travelling to a past or future time via time loops, time machines,
      time slips, time portals, accidental time travel, alternate timestreams, time warp, temporal paradoxes, experiencing
      time in reverse, communication from the future, being stuck in a time-loop, stories where time is a significant element,
      different spacetime geometries, wormholes in spacetime, stories based on the quantum mechanics of time travel, temporal
      war, etc. Use with: FM* codes for time travel or time slip fantasy stories, with FDK for alternate history science fiction,
      featuring alternate futures, different timestreams, multiple time paths'
    parent: FL
  FLH:
    name: Hard science fiction
    notes: 'Use for: science fiction that emphasises scientific detail and / or accuracy, or that use science that exist within
      the realm of scientific possibility or do not go outside the known physical laws of the universe'
    parent: FL
  FLJ:
    name: 'Science Fiction: cosy / cozy'
    notes: 'Use for: science fiction stories that have a more positive, lighter and more comforting, feel-good or uplifting
      approach to telling the story, and that tend not to create any anxiety, often featuring narratives around hope and optimism,
      friends or friendship, found or chosen family, communities, and where conflicts or crisis are usually resolved through
      communication and understanding, with the help of community and friends, often stories with elements of science fiction,
      but where world-building is not a major element'
    parent: FL
  FLM:
    name: 'Science fiction: steampunk'
    notes: 'Also class here: dieselpunk, retrofuturism, stonepunk, atompunk, decopunk, clockpunk, steelpunk, rococopunk, silkpunk,
      arcanepunk. Use for: science fiction based on an alternative world where 19th century steam power has emerged as the
      dominant technology, or any other retrofuturistic ‘punk’ genre where a certain technology from the past has become dominant'
    parent: FL
  FLP:
    name: 'Science fiction: near future'
    notes: 'Also class here: AI takeovers, robot uprisings, super robots, intelligent technology, genetic engineering, artificial
      intelligence, alternative realities. Use for: sci fi set in a very near future, from the creators point of view, and
      in a world that is a natural progression from their own, that often feature current technologies or technology in development
      and its effects upon the world, that may feature things such as advanced high tech, artificial intelligence, robots,
      Mecha, cyborgs, transhumanism, the technological singularity'
    parent: FL
  FLPB:
    name: 'Science fiction: cyberpunk / biopunk'
    notes: 'Also class here: Nanopunk, Cyber-noir, solarpunk, techno-noir. Use for: science fiction based on marginalised
      or low-life characters in a highly technologically advanced society or focused on the implications of biotechnology
      or genetic engineering'
    parent: FLP
  FLQ:
    name: 'Science fiction: apocalyptic and post-apocalyptic'
    notes: 'Also class here: end of the world stories, dying earth, collapsing or collapsed civilization. Use for: stories
      set in worlds trying to prevent, or experiencing or that have already been affected by an apocalypse event, such as
      runaway climate change, an impact event, resource depletion, nuclear holocaust, pandemics, plagues, viruses, the end
      times, a zombie apocalypse, cybernetic revolts, technological singularity, invasion from space, dysgenics, an electromagnetic
      pulse (EMP), stories of groups of survivors or survival after a catastrophe or cataclysm etc. Use with: FXE for climate
      fiction or ecological collapse, FXV for stories of journeys through a devastated world or other codes and qualifiers
      as appropriate'
    parent: FL
  FLR:
    name: 'Science fiction: military'
    notes: 'Use for: science fiction set within the military or where organised use of weaponry is central to the plot, See
      also: FLS'
    parent: FL
  FLS:
    name: 'Science fiction: space opera'
    notes: 'Also class here: Galactic empires, planetary romance. Use for: science fiction set in space, usually with advanced
      cultures and technology'
    parent: FL
  FLU:
    name: 'Science fiction: aliens / UFOs'
    notes: 'Also class here: first contact, alien invasion, human interaction with extra-terrestrial life forms, alien conspiracies'
    parent: FL
  FLW:
    name: 'Science fiction: space exploration'
    notes: 'Also class here: colonisation of space, settlement of planets or moons, exploration of deep space, moon bases,
      generation ships, terraforming, first landings on other planets, astronauts'
    parent: FL
  FM:
    name: Fantasy
    notes: 'Use all FM* codes for: Classic fantasy, other worlds fantasy, Crossworlds fantasy, Futuristic fantasy, Portal
      fantasy, Parallel worlds, Quest fantasy, Literary fantasy, Hard fantasy. Use all FM* codes with: other codes for different
      types of fantasy that do not have a unique code, for example, with 5LKE for New Adult Fantasy, 5PX-XA-A for Arthurian
      fantasy, VXQM1 for dragon fantasy, 5PGM for Christian fantasy, 5PS, 5PT, 5PU or 5PV for LGBTQIA+ fantasy, FXB for coming
      of age fantasy, FU* for Comic fantasy, 5YH for Anthropomorphic fantasy, FDB or FLQ for dying earth or post-apocalyptic
      fantasy, FP for erotic fantasy or FRX for Erotic Fantasy Romance, FXP for Political fantasy, FLM for Steampunk fantasy,
      FJW for Weird west fantasy, FL* for Sword and planet fantasy, 6AU for Academy fantasy, etc'
    parent: F
  FMB:
    name: Epic fantasy / high fantasy
    notes: 'Use for: stories set in alternative or secondary worlds, usually with detailed world building and a complex fictional
      universe or shared world, and often involving large events or long quests'
    parent: FM
  FMBN:
    name: Heroic fantasy / Sword and sorcery
    notes: 'Also class here: Swashbuckling fantasy. Use for: works of fantasy that concentrate more on the adventures and
      battles of the hero or main protagonist, rather than the world building, or fantasy stories that feature a hero, anti-hero
      or morally grey hero going on some sort of quest or any sort of hero‘s journey in a fantasy or supernatural setting
      where the narrative concentrates more on the adventure rather than building the fantasy world. Use with: other FM* codes
      as appropriate'
    parent: FMB
  FMH:
    name: Historical fantasy
    notes: 'Also class here: Medieval, Dark Age, Classical (Greek and Roman), Arabian, Celtic, Fantasy of Manners, Mannerpunk,
      Flintlock, Gunpowder, Prehistoric, Gaslamp fantasy genres. Use for: fantasy that incorporates fantastic elements, such
      as magic or elements from myths, into recognisable historic settings, periods, cultures etc. Use with: PLACE 1* and/or
      TIME PERIOD 3* Qualifiers to indicate setting as appropriate'
    parent: FM
  FMJ:
    name: 'Fantasy: cosy / cozy'
    notes: 'Use for: fantasy stories that have a more positive, lighter and more comforting, feel-good or uplifting approach
      to telling the story, and that tend not to create any anxiety, often featuring narratives around hope and optimism,
      friends or friendship, found or chosen family, communities, and where conflicts or crisis are usually resolved through
      communication and understanding, with the help of community and friends'
    parent: FM
  FMK:
    name: Comic (humorous) fantasy
    parent: FM
  FMM:
    name: Magical realism
    notes: 'Also class here: Magic realism. Use for: works that incorporates fantastic, magical, mythical or supernatural
      elements into an otherwise real-world or mundane setting, stories that have a largely realistic view of the world but
      with a few supernatural or magical elements, that are often used to make a point about reality. Use with: FBA or FBC
      for literary works that incorporate magical realism, for example, those of the kind frequently associated with literature
      from Latin America or other literary traditions'
    parent: FM
  FMR:
    name: Fantasy romance / Romantic fantasy
    notes: 'Also class here: Romantasy, fantasy with a romance element. Use for: fantasy stories using many of the elements
      and conventions of the romance genre but that remain primarily and recognisably a fantasy story, where the main plot
      is a fantasy story but with a strong romantic sub-plot. Use with: FRX for romantic fantasy stories with a more erotic
      or sexual storyline, or other FR* or FM* codes as appropriate, See also: FRV FRT'
    parent: FM
  FMS:
    name: Superhero stories
    notes: 'Use for: fiction featuring or where the main characters are depicted as superheroes / superheroines or superhumans'
    parent: FM
  FMT:
    name: Dark fantasy
    notes: 'Also class here: Grimdark. Use for: fantasy stories with darker and frightening themes, often incorporating elements
      of horror or that have a gloomy and threatening atmosphere or a sense of horror and dread'
    parent: FM
  FMW:
    name: Contemporary fantasy / Low fantasy
    notes: 'Also class here: intrusion fantasy, mundane fantasy. Use for: fantasy set in the present day or contemporary or
      modern settings or set in a recognisable version of our world, but with elements of fantasy or the supernatural added
      in'
    parent: FM
  FMX:
    name: Urban fantasy
    notes: 'Also class here: Elfpunk, Arcanepunk fantasy, gritty urban fantasy. Use for: fantasy works set in urban settings,
      often featuring plots where the real modern urban setting and the supernatural or paranormal collide or overlap, or
      where mythical or supernatural beings and creatures exist in recognisable urban settings. Use with: VXQ* codes as appropriate'
    parent: FM
  FN:
    name: Traditional or cultural fiction and true stories, tales and retellings
    notes: 'Also class here: Fables. Use all FN* codes for: stories that often have a long and continuous existence through
      multiple generations, stories that get told and retold, traditional local folktales, tall tales, folklore, folk literature,
      wisdom tales, cautionary stories, teaching stories, origin tales, or any form of traditional story told or retold. Use
      for: modern retellings in novel form or collections of traditional tales and stories aimed primarily at adults, or works
      inspired by these stories, See also: DBS* QRS* JBGB YFJ YNRU'
    parent: F
  FNF:
    name: Fairy and Folk tales / Fairy tale retellings
    notes: 'Also class here: folk and fairy tales from any culture told in a story form, or fantasy retellings of these stories,
      fairy tales as fiction, fairy tale fantasy. Use for: modern retellings in novel form or collections of these types of
      traditional stories aimed primarily at adults, or stories recognisably inspired by traditional fairy stories or that
      in some way draw from the characters, tropes, themes and symbolism of folklore and fairy tales and where, for example,
      an author might tell a new story based on a popular fairy tale or character from a classic work, or take a ‘what if’
      approach or create a mashup of different genres, for example, fairy tale meets dystopian future, See also: JBGB YFJ
      YNXB4'
    parent: FN
  FNM:
    name: Myths and Legends / Mythic fiction
    notes: 'Also class here: Mythological Fiction, Legend fantasy, Mythic fantasy, myths and legends from any culture told
      in story form, myth or legend retold as fiction, or genres such as mythpunk, godpunk, Shenmo, Gods and Demons fiction,
      Xianxia, Immortal heroes fiction, Arthurian fiction, Classical (Greek and Roman myths told as stories or retold). Use
      for: modern retellings in novel form or collections of these types of traditional stories aimed primarily at adults,
      or stories recognisably inspired by traditional myths or stories that draw from the characters, gods and goddesses,
      heroes and heroines, tropes, themes and symbolism of myths or legends and where, for example, an author might tell a
      new story based on a myth, or take a ‘what if’ approach or create a mashup of different genres, for example, mythology
      crossed with contemporary adventure story. Use with: QRS* or QRR* codes or PLACE1* qualifiers to indicate which tradition,
      as appropriate, See also: DBS* JBGB QRS* YFJ YNRU'
    parent: FN
  FNT:
    name: Trickster stories and tales
    notes: 'Use for: stories that feature a trickster character such as a spirit, a deity, a human or an animal, or stories
      inspired by or retellings of stories about trickster characters from different cultures'
    parent: FN
  FP:
    name: Erotic fiction / Erotica
    notes: 'Also class here: Erotic literature. Use for: stories aimed at adults of an erotic nature that deal explicitly
      with sexual relationships and themes, that are not primarily a romance story. Use with: other F* codes for genre fiction
      that is also erotic and with 5PRD for erotic novels about BDSM, fetish or kink sex or other erotic subcultures and INTEREST
      Qualifier 5X as appropriate. DO NOT USE: with FRX code, See also: FRX'
    parent: F
  FQ:
    name: Contemporary lifestyle fiction
    notes: 'Also class here: feel-good fiction, cozy / cosy fiction, up-lit, ‘slice of life’ fiction. Use for: stories set
      primarily in the present day or contemporary settings, dealing with realistic everyday themes or lifestyles, usually
      in a light-hearted, sometimes uplifting, manner, often focusing on things like the everyday trials and tribulations
      of the main protagonist, their friendships, their found families, relationships, ups and downs of life, their workplace
      or professional life, or their place of education, their day-to-day lifestyles, their social life, their emotions, or
      may be life affirming stories about everyday characters which champion empathy, understanding, kindness, stories of
      everyday joy or sadness, everyday hope and optimism, etc. Use with: other F* codes for particular genres, See also:
      FRB FRD'
    parent: F
  FR:
    name: Romance
    notes: 'Use all FR* codes for: Love stories, classic romance, slow burn romances. Use all FR* codes with: qualifiers for
      particular types of romance, for example, with 5H* qualifiers for Holiday Romance, such as 5HRB for summer vacation
      romance or 5HPD for Christmas romance, 5PS* or other 5P* qualifiers for LGBTQIA+ romances, 5LKS for romance in later
      life, FL* codes for Science fiction romance, FJ* for action and adventure romance, JBSE for small town romance, 5PB-US-C
      for Black and African American romance, 5HKU for Romance about marriage, FYL for Gothic romance, 5LKE for New Adult
      romance, etc'
    parent: F
  FRB:
    name: Romantic comedies
    notes: 'Also class here: Rom-coms. Use for: genre romance and love stories that are also comic, humorous, light hearted
      or funny in their approach'
    parent: FR
  FRD:
    name: Modern and Contemporary romance
    notes: 'Use for: romance stories where the main characters live and work in a world most readers can understand, with
      modern conveniences and current social mores. Use with: other FR* codes and qualifiers for particular sub-genres of
      contemporary romance, and with qualifiers as appropriate'
    parent: FR
  FRDJ:
    name: 'Romance: cosy / cozy'
    notes: 'Use for: romance and love stories that have a more positive, lighter and more comforting, feel-good or uplifting
      approach to telling the story, and that tend not to create any anxiety, often featuring narratives around hope and optimism,
      friends or friendship, found or chosen family, communities, and where conflicts or crisis are usually resolved through
      communication and understanding, with the help of community and friends'
    parent: FRD
  FRE:
    name: 'Romance: workplace'
    notes: 'Also class here: First job romances, office romances, forbidden workplace romance, love in the workplace, professional
      romance, renovation romance, working from home romance, boss romance. Use for: Romance stories featuring or set in a
      working environment, or about a relationship with a work colleague or a romance with a person who is doing some work
      or working for the other person, for example, someone who is helping to renovate a building, doing some long-term construction
      work, the gardener, the boss, the CEO, the bodyguard, etc'
    parent: FR
  FRF:
    name: 'Romance: wholesome / clean'
    notes: 'Also class here: sweetheart romance. Use for: romance that does not contain any strong language or physical intimacy.
      Use with: FW for religious romance, faith-driven romance, or inspirational romance, and with 5PG* INTEREST Qualifiers
      as appropriate to indicate a wholesome romance with themes inspired by a particular spiritual belief or faith or with
      other FR* codes for wholesome romances that are also considered part of another genre romance, with 5PB-US-B for Amish
      romance, 5PGM for Christian romance, 5PGP for Muslim romance, etc'
    parent: FR
  FRG:
    name: 'Romance: college / university'
    notes: 'Also class here: Student romance. Use for: genres of romance fiction often set in an academic environment such
      as a university or a college campus or an academy, usually featuring university aged characters discovering life as
      newly adult people, getting their first taste of adult love, romance and often sexual experience. Use with: 5LKE if
      the main characters and the storyline concern the newly adult or those young adults who have left home for the first
      time'
    parent: FR
  FRH:
    name: Historical romance
    notes: 'Use for: romance stories set in the past (typically before the writer’s lifetime), where the time period is a
      significant or essential part of the story, and that portray the spirit, manners, and social conditions of that time
      with realistic detail (e.g. Regency romances, Victorian romances, US Civil War, Gilded Age, Belle Epoch romance, Arthurian
      romance, Medieval or Renaissance romance, Tudor romance, Romances set in the Ancient world or romances featuring Vikings,
      pirates, Scottish highlanders, knights, etc). Use with: PLACE 1* and/or TIME PERIOD 3* Qualifiers to indicate setting
      as appropriate,'
    parent: FR
  FRJ:
    name: 'Romance: ‘western’, rural or ‘outback’'
    notes: 'Also class here: cowboy, cowgirl, frontier, rancher, rodeo, gaucho, vaquero romances. Use for: romance that takes
      place in very rural environments, often set on farms, ranches, haciendas, or in small rural communities, usually far
      from any city and often set in the Western parts of the USA, Mexico or Canada, the pampas of South America, the Australian
      outback or similar environments. Use with: PLACE 1* Qualifiers to describe setting and TIME PERIOD 3* for historical
      settings'
    parent: FR
  FRK:
    name: 'Romance: love triangles'
    notes: 'Also class here: Romance stories featuring extramarital love affairs, cheating love triangles, love triangle jealousy,
      or other stories featuring some sort of love triangle. Use for: romance stories usually featuring a triangle of relationships
      and typically involving two people who are competing for the third person’s romantic attention or one person in love
      with two different people'
    parent: FR
  FRL:
    name: 'Romance: unlikely or unexpected lovers'
    notes: 'Also class here: second chance romance, neighbours to lovers, roommates to lovers, opposite attracts, unlikely
      loves, forbidden love, unforeseen romance, Grump and sunshine romances, sworn off love, etc. Use for: Romance where
      the plot revolves around a significant change or an adaptation of the nature of an existing relationship between the
      main characters'
    parent: FR
  FRLC:
    name: 'Romance: friends to lovers'
    notes: 'Use for: romance stories where the main characters initially have a relationship based on friendship that gradually
      changes into a strong attraction'
    parent: FRL
  FRLE:
    name: 'Romance: enemies to lovers'
    notes: 'Also class here: Rivals to lovers’ romance, Frenemies. Use for: romance stories where the main characters initially
      have a conflicting relationship that gradually changes into a strong attraction'
    parent: FRL
  FRLF:
    name: 'Romance: fake or pretend relationships'
    notes: 'Also class here: fake-dating, false relationships, fake boyfriend or girlfriend, marriage of convenience romances.
      Use for: romance stories where the main characters initially have some sort of fake or pretend romantic relationship'
    parent: FRL
  FRLH:
    name: 'Romance: unintentional or forced proximity'
    notes: 'Also class here: Stuck together romances, Only-one-bed romances, road trip romances, trapped together romances.
      Use for: romance stories where the main characters initially are thrown together into close proximity for various reason'
    parent: FRL
  FRM:
    name: Romantic suspense
    notes: 'Use for: a romance story that also involves a mystery, crime, suspense or thriller storyline but remains primarily
      a romance story. Use with: other F* genre fiction codes as appropriate'
    parent: FR
  FRN:
    name: 'Romance: sports'
    notes: 'Also class here: Athlete Romance, Football romance, hockey romance, baseball romance, cricket romance, soccer
      romance, etc. Use for: Romance featuring participants in sports, sports stars, athletes, coaches, owners, agents, sports
      teams, sporting events, sporting activities or any romance where the sports element is an integral part of the story.
      Use with: S* codes to indicate which sport is the key aspect of the romance story'
    parent: FR
  FRP:
    name: Romance in uniform
    notes: 'Also class here: military, armed services, armed forces, security, sailors, aircrew, law enforcement, soldiers,
      sheriffs, cops, firefighters, police, pilots, cabin crew etc. Use for: romance stories where one or more of the main
      protagonists is in a job that means wearing a formal uniform'
    parent: FR
  FRQ:
    name: 'Romance: medical'
    notes: 'Use for: romance stories featuring doctors, nurses, surgeons, veterinarians, or any professional medical setting,
      such as a hospital or clinic, etc'
    parent: FR
  FRR:
    name: 'Romance: the rich / famous / powerful'
    notes: 'Also class here: Rockstar romance, Rags to riches romance, Millionaire or Billionaire romance, Secret Billionaire
      romance, Celebrity romance, Royal romance. Use for: genres of romance fiction featuring persons in position of great
      wealth, power, status or similar, such as the jet set, super-rich, billionaires, royalty, aristocrats, rock stars, celebrities,
      high society, celebrity meets a non-celebrity and they fall in love, romance story featuring an ordinary person and
      a very rich, powerful, famous person, or romance fiction featuring at least one of the main characters who is royal
      or aristocratic or other inherited positions and titles, or featuring a royal kingdom or aristocratic domain, royal
      meets a non-royal and they fall in love, romance story featuring an ordinary person and an aristocratic or royal personage,
      etc. Use with: 5PDM* or other 5* INTEREST Qualifiers as appropriate'
    parent: FR
  FRS:
    name: 'Romance: multiple partners / lovers'
    notes: 'Also class here: ‘why choose’ romances, harem or reverse harem romances, polyamory romance. Use for: Romance or
      love stories featuring things like, open relationships, polyamorous relationships, polyandry, polyfidelity, consensual
      non-monogamy or non-exclusive relationships, or stories featuring multiple lovers, partners or romantic interests. Use
      with: VFVG2 for romances about polyamory, and with INTEREST 5* Qualifiers as appropriate'
    parent: FR
  FRT:
    name: 'Romance: fantasy and paranormal'
    notes: 'Also class here: vampire romance, were / shifter romance, supernatural romance, monster romance, alien romance,
      fantasy romance, paranormal romance. Use for: a romance story which blends elements from the fantasy genre or features
      mythical creatures or supernatural elements but remain primarily and recognisably a romance story, where the main plot
      revolves around a romance, with a fantasy or paranormal setting or with fantasy elements included. Use with: FM* or
      VXQ* codes as appropriate, for example for romance stories featuring a romance with vampires, werewolves or shapeshifters
      use with VXQM2, featuring demons with VXQM5, for angels, VXPS, ghosts, VXQG, witches VXWT, aliens VXQB, etc, See also:
      FMR'
    parent: FR
  FRU:
    name: 'Romance: time travel / time slip'
    notes: 'Also class here: romance and love stories based on travelling to a past or future time via time loops, time machines,
      time slips, time portals, accidental time travel, alternate timestreams, time war, temporal paradoxes, experiencing
      time in reverse, communication from the future, being stuck in a time-loop'
    parent: FR
  FRV:
    name: Dark romance
    notes: 'Use for: genre romance stories where the themes are darker, usually featuring an anti-hero or non-heroic characters
      and/or distressing situations, often exploring themes such as the darker side of power dynamics in a relationship, questionable
      morals or ethics, they may feature trauma and violence, or they may deal with darker psychological themes of evil or
      horror in society. Use with: 5X if appropriate'
    parent: FR
  FRW:
    name: 'Romance: bad boys / bad girls'
    notes: 'Also class here: Rebel and outsider romance, Mafia romance, Mob romance, MC Romance, Motorcycle Club Romance,
      Rogues, Rebels, and Rakes romance, Bad boy romance, Bad girl romance, Alpha Male romance, Bully romance, Biker romance,
      MMA romance, Fighter romance, or romances featuring characters such as assassins, criminals, outlaws, bandits, or morally
      grey characters. Use for: romance genre stories where one of the main protagonist is often a very strong, possessive,
      confident, and dominant male or female character, or romances where the main character works for, or is involved with,
      crime or criminal organisations, or is seen as an anti-hero, a wrongdoer, an outsider, or to have a bad or dangerous
      character, or is morally ambiguous, but the “bad” character will usually have a redeeming side or a change during the
      story. Use with: FJ* for action and adventure stories, with FHR or FFL for romance stories featuring organised crime,
      and with INTEREST 5* Qualifiers as appropriate. Prefer: FRV for romance stories with darker themes, See also: FRV'
    parent: FR
  FRX:
    name: Erotic romance
    notes: 'Also class here: Spicy romance, Steamy romance. Use for: romance fiction which contains explicit sexual content,
      or where the plot of the love story revolves around the sex, but which remains primarily and recognisably a romance
      story. Use with: INTEREST Qualifier 5X as appropriate, and with 5PRD for erotic romance stories revolving around BDSM,
      fetish or kink sex and other qualifiers and FR* codes as appropriate. DO NOT USE: with FP code, See also: FP'
    parent: FR
  FS:
    name: Family life fiction / Stories about family
    notes: 'Also class here: family dramas, inter-family stories, family rivalries, stories about siblings, brother-sister
      stories, stories about twins, parent and child stories, etc. Use for: novels of domestic or small-scale family life,
      often with a focus on the relationships within a family – of any type – but not of the FT* Generational sagas genre.
      Use with: other F* codes as appropriate, See also: FT'
    parent: F
  FT:
    name: Family saga / generational saga fiction
    notes: 'Also class here: Multigenerational family sagas. Use for: genre novels which chronicle the lives and fortunes
      of a family or a number of related or interconnected families over a period of time and often over generations. These
      are often part of a sequence of novels. Use with: FR* codes for Romantic sagas or with FV when the historical setting
      is particularly important, for example for epic historical family sagas and PLACE 1* and/or TIME PERIOD 3* Qualifiers
      to indicate setting as appropriate. DO NOT USE: for traditional Icelandic or Old Norse sagas, See also: FS'
    parent: F
  FU:
    name: Humorous fiction
    notes: 'Also class here: Comedic stories, comedy fiction, funny and comic novels. Use for: fiction where humour is the
      primary aim and feature except prefer genre-specific ‘humorous’ headings where available. Use with: other F* codes as
      appropriate, for humorous genre fiction'
    parent: F
  FUP:
    name: Satirical fiction and parodies
    notes: 'Use for: humorous fiction which is satirical and/or which parodies existing fiction, genres or writers, See also:
      WHP FYH'
    parent: FU
  FV:
    name: Historical fiction
    notes: 'Use for: stories set in the past (typically before the writer’s lifetime), where the time period is a significant
      or essential part of the story and that portray the spirit, manners, and social conditions of that time with realistic
      detail. Use with: other F* codes as appropriate and PLACE 1* and/or TIME PERIOD 3* Qualifiers to indicate setting as
      appropriate. Prefer: genre-specific ‘historical’ headings where available, See also: FFH FJH FMH FRH'
    parent: F
  FW:
    name: Religious and spiritual fiction
    notes: 'Also class here: faith-inspired or inspirational fiction. Use for: fiction designed to promote a particular religious,
      spiritual or visionary message. Use with: 5PG* values from INTEREST 5* Qualifiers as appropriate, or where unavailable,
      a QR* or VX* code and with other F* codes, for example FR* for Religious romance novels, with VX* codes for visionary
      or spiritual fiction, with 5PGM for Christian Fiction, etc'
    parent: F
  FX:
    name: 'Fiction / Literature / Comics / Graphic novels: narrative themes'
    notes: 'Use all FX* codes for: identifying the primary theme of a narrative work, when that theme is not conveyed by the
      choice of a genre fiction or manga, comic book or graphic novel category. Use all FX* codes with: FB* codes or other
      F* codes indicating genre or type, or with Literature DB*, DC*, DD* or Comics (Graphic novel / Comic book / Manga etc):
      genre XQ* codes, to indicate the principal underlying narrative theme of a work of fiction, literature, poetry, drama
      theatre, comic books etc. FX* codes can also be used in conjunction with non-fiction categories to give greater definition
      to the narrative theme where appropriate, FX itself can be used with a non-fiction code if there is not a suitable other
      FX* code. DO NOT USE: FX* codes as the primary or main subject code or simply to indicate a mood or emotion evoked by
      a story'
    parent: F
  FXB:
    name: 'Narrative theme: coming of age'
    notes: 'Also class here: bildungsroman, growing up, rites of passage, passage from childhood or youth to adulthood as
      narrative themes, stories about a young person going from being a child to being an adult'
    parent: FX
  FXC:
    name: 'Narrative theme: books and the world of books'
    notes: 'Also class here: stories, novels and works of fiction where the main theme is about the world of books, including,
      booksellers, bookshops, libraries, literature, writers, the art of writing, books about reading, books about books,
      book clubs, publishers or any story that has a main theme taken from the world of books'
    parent: FX
  FXD:
    name: 'Narrative theme: love / relationships'
    notes: 'Use for: fiction where a strong relationship or love is the central theme but which is not a genre romance novel.
      This can include friendships, found family, family relationships, sibling relationships, parent-child relationships,
      any form of affective relationship, relationships between couples, relationships that are negative or hostile, or complex
      emotional relationships, forbidden love, a love triangle, unrequited love, love of family, relationships amongst a group
      of friends or a peer group, examination of relationships with others, acquaintances, strangers etc, as long as it is
      one of the principal themes of the story. Use with: INTEREST 5* Qualifiers for detail of specific kinds of relationships
      as appropriate. DO NOT USE: with FR* codes'
    parent: FX
  FXE:
    name: 'Narrative theme: environmental issues / the natural world'
    notes: 'Use for: fiction that addresses a specific environmental issue or nature-orientated topics as a central theme.
      Use with: other subject codes to give more specific definition to the topic if appropriate, for example, FD*, FL* ,
      FF* or FH* codes for Climate fiction (Cli-fi), Eco-fiction or eco-thrillers or FB* for nature writing in fiction, or
      with XQ* codes for comic books, graphic novels or manga that have major themes around the natural world or the environment'
    parent: FX
  FXED:
    name: 'Narrative theme: animals'
    notes: 'Use for: fiction or stories that feature animals or any living creature as a major or significant part of the
      plot or theme, or where human interactions or relationships with animals, including pets, is a main part of the plot,
      or one or more of the main characters or protagonists are animals. Use with: WN* codes if the story is about a specific
      type of animal, for example, WNGC for stories about cats, or WNGD for stories about dogs'
    parent: FXE
  FXF:
    name: 'Narrative theme: war and conflict'
    notes: 'Use for: works of fiction that take place during periods of war or armed conflict or civil strife, and where the
      experience or consequences of war, or battle or armed conflict is the major theme or topic of the story and is explored
      through the plot or the development of the main characters. Prefer: FJM* codes for action and adventure war fiction,
      See also: FJM*'
    parent: FX
  FXK:
    name: 'Narrative theme: health and illness'
    notes: 'Use for: fiction where health, coping or living with illness – physical or mental – or the consequences of sickness
      is a central theme, or themes based on medical topics or suffering linked to physical or mental health, chronic illness
      or conditions, chronic pain, or themes around the healing, recovery or recuperation from illness'
    parent: FX
  FXL:
    name: 'Narrative theme: death, grief, loss'
    notes: 'Use for: fiction where death, dying, the end-of-life, a loss or the experience of grief or mourning is a central
      theme and one of the key elements of the story, but not for genre fiction like crime, thriller or adventure novels that
      happen to have a death in them'
    parent: FX
  FXM:
    name: 'Narrative theme: interior life / psychological fiction'
    notes: 'Also class here: psychological realism, character-driven psychological stories, stories with an interior monologue
      or stream of consciousness. Use for: fiction which places particular emphasis on interior characterization, and on the
      motives, emotions, feelings and thoughts or mental lives of characters, stories that explore the mental state of a character.
      Prefer: FHX for psychological thrillers, See also: FHX'
    parent: FX
  FXN:
    name: 'Narrative theme: identity / belonging'
    notes: 'Use for: fiction where the identity, the sense of, or search for, identity of whatever kind – social, cultural,
      religious, gender etc, as an individual or part of a group – of the main character(s) is the main, or one of the main
      themes of the story, or narratives where the characters sense of belonging or search or need for belonging is the main
      or major theme of the plot. Use with: other subject codes and INTEREST 5* Qualifiers as appropriate'
    parent: FX
  FXP:
    name: 'Narrative theme: politics / economics'
    notes: 'Also class here: Political novels, fiction as political or economic criticism, novels of political satire, fiction
      as commentary or discussion on politics, economics, society, government, diplomacy, politicians or political culture,
      political power, political corruption as major themes of a story. Use for: fiction or literature where political or
      economic concerns are the underlying narrative theme including political or economic allegories. Use with: DC* for political
      poetry. Prefer: FHP for political thrillers, See also: FHP'
    parent: FX
  FXQ:
    name: 'Narrative theme: displacement, exile, migration'
    notes: 'Use for: fiction that has major themes relating to diasporas, dispersion, asylum, deracination, forced relocation,
      cultural transitions, forced journeys, living in exile, being exiled, emigration, expatriation, immigration, refugees,
      forced resettlement, etc, See also: FXV'
    parent: FX
  FXR:
    name: 'Narrative theme: sense of place'
    notes: 'Use for: fiction set in a real location where the setting or landscape very deeply pervades the work to the extent
      that it could not be set anywhere else; e.g. the French tradition of ‘roman du terroir’. Use with: PLACE 1* Qualifiers,
      and other subject codes for example, with JBSD for novels where city life is a main theme, or JBSG for reservation life
      or rez lit, or JBSE for small town life novels, JBSC for works of fiction where the setting in a small town, village,
      a rural area, or in the countryside and the associated lifestyle or living conditions are critical to the sense and
      meaning of the story'
    parent: FX
  FXS:
    name: 'Narrative theme: social issues / social problems'
    notes: 'Also class here: Social protest novels, fiction as social commentary, stories about social unrest. Use for: fiction
      that addresses a specific social problem or issue as a central theme, such as, poverty or precarity, economic inequalities,
      homelessness, housing issues, conditions in factories and mines, the plight of child labour, violence against women,
      rising criminality, and epidemics because of over-crowding and poor sanitation in cities or works of fiction in which
      a prevailing social problem, such as gender, race, or class prejudice, is dramatized through its effect on the characters
      of a novel. Use with: other non-fiction codes, especially JBF* codes, to give more detail of the main social issue but
      an F* code MUST be designated as the Main Subject'
    parent: FX
  FXT:
    name: 'Narrative theme: diversity, equity, equality, inclusion'
    notes: 'Use for: works of fiction where the main narrative theme or subject matter clearly illustrates topics relating
      to aspects of accessibility, social justice, equity or equality, diversity and inclusivity within the context of the
      story, or the story explores themes of DEI, or attempts to achieve DEI. Use with: other subject codes and INTEREST 5*
      Qualifiers to give greater detail as appropriate'
    parent: FX
  FXV:
    name: 'Narrative theme: journeys and voyages'
    notes: 'Also class here: road trip stories, stories about voyages of exploration and discovery, stories about quests,
      epic journeys or about wanderers. Use for: fiction where a journey, expedition, voyage or some sort of travel or trip
      is the main or a major narrative theme of the story, See also: FXQ'
    parent: FX
  FY:
    name: 'Fiction / Literature / Comics / Graphic novels: special features'
    notes: 'Use all FY* codes with: other F* code indicating genre or subject, or with literature DB*, DC*, DD* or Comics
      (Graphic novel / Comic book / Manga etc), genre XQ* codes, to indicate the principal underlying distinct aspects, attributes,
      characteristic or features of a work of fiction. FY* codes should not usually be the primary or main subject code. DO
      NOT USE: FY itself - always use FY* codes'
    parent: F
  FYB:
    name: Short stories
    notes: 'Also class here: Anthologies or collections of short works of fiction either by the same author or by multiple
      authors. Use with: DNT for anthologies of short stories by theme or by multiple authors'
    parent: FY
  FYC:
    name: Novella (Short Novel)
    notes: 'Use for: works of fiction that are neither seen as short stories nor as novels by their creators'
    parent: FY
  FYD:
    name: Epistolary fiction / fictional diaries
    notes: 'Use for: fiction, literature, comic books or any fictional narratives that are written in a series of documents,
      letters, diaries, journals, emails, blogs, social media posts, etc'
    parent: FY
  FYG:
    name: 'Fiction: continuations by another'
    notes: 'Also class here: Continuation novels. Use for: works of fiction where a new author continues an established series
      after the original authors death. These can be official with the permission of the literary estate or unofficial for
      works now out of copyright. These stories may be sequels to the original series or be stories that are prequels or precede
      the original storyline, but all the stories are written after the original authors death'
    parent: FY
  FYH:
    name: 'Fiction: pastiche'
    notes: 'Use for: fiction written deliberately in the style of another (typically earlier) author (as homage rather than
      parody), See also: FUP'
    parent: FY
  FYJ:
    name: 'Fiction: dual or multiple timelines'
    notes: 'Also class here: Past-Present narratives. Use for: fiction, literature, comic books or any fictional narratives
      that have storylines featuring two or more timelines (but where there is no time travelling or time slips), where a
      single cohesive narrative, is told using multiple time periods and perspectives'
    parent: FY
  FYL:
    name: 'Fiction: gothic'
    notes: 'Use for: fiction, literature, comic books or any fictional narratives that are usually create an atmosphere of
      tension and suspense for the reader using psychological techniques and often feature themes things like a sense of fear
      and haunting, gloom or death, a dark past, a claustrophobic atmosphere, an oppressive, bleak, decayed or derelict setting,
      the threat of supernatural events, and the intrusion of the past upon the present and that often inspire fear through
      a romanticized view of the past, and often combining elements of both horror and romance etc. Use with: FR* for Gothic
      romance, FK* for Gothic horror, other F* codes for other types of Gothic fiction, with PLACE1* Qualifiers for gothic
      fiction associated with a particular area, such as 1KBB-US-S* codes - for Southern Gothic (USA) or 1KL* codes for gothic
      fiction set in Latin America'
    parent: FY
  FYM:
    name: 'Fiction: mashup / crossover'
    notes: 'Also class here: mash-up or mashed-up novels. Use for: fiction which combines a pre-existing text, often a classic
      novel, with another contrasting genre, such as horror, into a single narrative, or that takes fictional characters,
      settings, or universes from different fictions and places them into a single story. Use with: other F* or non-fiction
      codes to indicate component elements, See also: FUP'
    parent: FY
  FYP:
    name: Fiction based on or inspired by true events
    notes: 'Use for: fiction based on or inspired by a true event or happening but where this is told in narrative fictionalised
      form and is not just an account of the event itself. Use with: other F* codes to describe the genre or with Literature
      DB*, DC*, DD*, comic books XQ* codes. Prefer: DNX for narrative accounts of true stories, or FC for fiction based on
      peoples lives, See also: DNX FC'
    parent: FY
  FYQ:
    name: 'Fiction: special features: yaoi / BL / danmei novels'
    notes: 'Also class here: boys’ love novels. Use for: East Asian style stories, often related to comics or anime, featuring
      male same-sex relationships, created principally, but not exclusively, for a female readership. Use with: other F* codes
      to indicate genre, for example FR* codes for Romance stories, 5LKE * codes if they are about that generation, See also:
      XAMT'
    parent: FY
  FYR:
    name: Category fiction
    notes: 'Use for: the kind of romance, science fiction or other types of genre fiction or comic books, usually published
      on a monthly basis, short, in clearly delineated lines and with a certain number published every month. Use with: other
      F* code indicating genre or type, for example, with FR*codes for Category or Series Romance. DO NOT USE: FYR as the
      main or primary subject or the only code'
    parent: FY
  FYS:
    name: 'Fiction: special features: ranobe (‘light novels’)'
    notes: 'Also class here: Raito noberu, Japanese novellas, illustrated novellas. Use for: short fiction aimed at adults,
      usually driven primarily by dialogue and character and generally accompanied by illustrations in manga/anime or similar
      styles. Use with: other F* codes to indicate the genre. FYS may be used as a main subject as appropriate'
    parent: FY
  FYT:
    name: Fiction in translation
    notes: 'Use for: fiction and literature translated from another language. Use with: F* or with Literature DB*, DC*, DD*,
      or comic book XQ* codes to ensure classification is meaningful beyond the translation of the work itself and with 5T*
      - Literature of Place Qualifiers as appropriate. DO NOT USE: PLACE 1* or LANGUAGE 2* Qualifiers to specify the original
      language (this is described in other metadata). You may still use a PLACE 1* Qualifier if it is relevant to the plot
      or setting of the book. DO NOT USE: FYT as the main or primary subject or the only code'
    parent: FY
  FYV:
    name: 'Fiction: inspired by or adapted from other media'
    notes: 'Use for: stories that were published as spin-offs or companions to pre-existing non-book media or merchandise,
      novelizations and novels inspired by a popular film franchise, an online game or a TV series. Use with: other F* codes
      indicating genre or type, or with Literature DB*, DC*, DD* codes if this work is presented as a poem or a play, or XQ*
      for comic book. DO NOT USE: for titles that were subsequently made into films, film tie-in versions (this is described
      in other metadata)'
    parent: FY
  FYW:
    name: 'Fiction: special features: game-related / LitRPG stories'
    notes: 'Also class here: GameLit, RoLit, Game lit, literary role-playing game. Use for: fiction that is structured like
      a videogame or role playing game, or features the same kind of challenges as would be found in any type of game, or
      is about or set in a videogame, an online game, a role playing game, etc. Use with: other F* codes especially FL* or
      FM* as appropriate, or with Literature DB*, DC*, DD* codes if this work is presented as a poem or play or XQ* for comic
      book'
    parent: FY
  FZ:
    name: Fiction companion works
    notes: 'Use for: companion works to popular fiction or comic book series or titles, typically uncritical, such as an atlas
      or map of a mythical world or fictional universe, a compendium of characters or objects, to the flora, fauna or geography
      of the place, a guide to the series, art inspired by or taken from the series, a cookery book or crafts inspired by
      the series, etc. Use with: other F* codes indicating genre or type, or with Literature DB*, DC*, DD* or comic book XQ*
      codes if this work is presented as a poem or a comic book etc. Prefer: DS* codes for critiques or critical works, See
      also: DSR XR* DS*'
    parent: F
  Y:
    name: Children’s, Teenage and Educational
    notes: 'Use all Y* codes for: material aimed at, or purposefully written or created for a juvenile or adolescent audience
      (except for graphic novels, comic books, manga in X*). DO NOT USE: code ‘Y’ itself, but select specific categories from
      section Y*. Use all Y* codes with: only one INTEREST AGE 5A* Qualifier to indicate a guideline starting interest age
      (detailed age ranges should be included in other metadata) – or for YP* use EDUCATIONAL PURPOSE 4* qualifiers. All other
      qualifiers can be used as appropriate with Y* codes. DO NOT USE for: material intended primarily for adults that may
      also appeal to older teenagers. For ‘new adult’ content see note at 5LKE, for ‘Young Adult’ use the most appropriate
      5A* Qualifier according to local usage of the term. NB: Y* codes should be used along with X* codes for graphic novels,
      comic books, manga. Y* codes may be used in combination with A*– W* codes but always prefer Y* codes and if mixing Y*
      codes with A*– W* codes, the Y* code must ALWAYS be designated as the Main Subject and sent with one 5A* qualifier.
      If sending A*– W* codes as Main Subject, then Y* codes should NOT be included except for JNU / JNUM with YP* or DSYC
      for reviews or critiques'
    parent: null
  YB:
    name: 'Children’s: picture books, activity books, early learning concepts'
    notes: 'Use all YB* codes for: physical or digital items – the headings relate purely to the content, not the format (Format
      information is described in other metadata). Use all YB* codes with: only one INTEREST AGE 5A* Qualifier to indicate
      a guideline starting interest age'
    parent: Y
  YBC:
    name: Children’s picture books
    notes: 'Use all YBC* codes for: highly illustrated books (typically colour throughout) for children in which the content
      (either fiction or non-fiction) is conveyed through the use of words and pictures in combination or through pictures
      alone. A ‘picture book’ differs from a ‘book with illustrations’, in that the pictures it contains are at least as important
      as the text (if any) and form an essential component of the book. Use all YBC* codes with: other codes from Y* sections
      as appropriate, for example, YNB for Picture book biographies, or YPCA21 for picture books that are part of a structured
      reading scheme'
    parent: YB
  YBCB:
    name: Baby books
    notes: 'Use for: usually small format, board, bath, cloth or rag books, picture books with little or no text, and no explicitly
      educational early learning content, and usually very little story. Use with: YBG* codes for baby books which involve
      interactivity, or with YBL* codes if there is a significant theme or topic and with one 5AB* INTEREST AGE qualifier'
    parent: YBC
  YBCH:
    name: 'Picture books: character books'
    notes: 'Use for: all books based on TV or film characters, and all books featuring established pictorially-represented
      characters used in several books and or other products'
    parent: YBC
  YBCS:
    name: Picture storybooks
    notes: 'Also class here: wordless or almost-wordless picture stories. Use for: fully illustrated storybooks for children
      where the narrative is told mostly or entirely through pictures and where any text is totally dependent on the illustrations.
      Use with: relevant YF* codes to indicate the genre of story, as appropriate, or YN* or YX* categories as secondary codes
      for stories with specific themes. YBCS should usually be the primary or main subject when used with YF*, YN* or YX*
      categories. Prefer: X* codes for stories told in comic book or manga form, See also: XA* XQ*'
    parent: YBC
  YBCS1:
    name: 'Picture storybooks: bedtime stories, sleep and dreams'
    notes: 'Use for: works that are collections or individual stories to be read out loud or listened to by children at bedtime
      or works about getting ready for bed, going to sleep and bedtime routines, preparing children for bedtime or works that
      are purposefully created to help soothe or calm a child down and prepare them for sleep or help them to sleep, or are
      stories about dreaming or dreams'
    parent: YBCS
  YBCS2:
    name: 'Picture storybooks: imagination and play'
    notes: 'Use for: picture books featuring use of imagination and/or play, for example with toys, often to create an imaginary
      world'
    parent: YBCS
  YBD:
    name: 'Children’s / Teenage: Chapter books (transitional storybooks)'
    notes: 'Use for: children’s storybooks that are primarily text, but still contain plentiful illustrations. Usually of
      a relatively short length and low complexity, divided into very short chapters, and intended for transitioning readers
      – those moving on from picture storybooks. Use with: relevant YF* codes to indicate the genre of story, as appropriate,
      or YN* or YX* categories as secondary codes for stories with specific themes. Prefer: X* codes for stories told in comic
      book or manga form, See also: YBCS XA* XQ*'
    parent: YB
  YBG:
    name: Children’s interactive and activity books and kits
    notes: 'Use all YBG* codes for: children’s (of any age group) activity and interactive products; works where the primary
      purpose and main content of the product is an activity that requires participation and interaction, i.e. something to
      do or make, whether single use (e.g. press out and make, sticker books) or repeatable (e.g. touch and feel, making noises
      or sounds, etc). Use all YBG* codes with: other Y* codes as appropriate, and with 5H* qualifiers for activities linked
      to a specific holiday or season. Prefer: other Y* codes as the main category when the primary content (story or the
      subject) is more important than the interactivity. NB: Detailed format information is always described in other metadata'
    parent: YB
  YBGC:
    name: 'Children’s interactive and activity: drawing, colouring and painting'
    notes: 'Also class here: books to colour in, magic painting books, books and painting sets, fingerprinting, rubber stamps,
      connect the dots, dot to dot, paint-by-numbers, stencil books, doodles, finger painting, learning to draw or paint,
      books to draw in, etc, See also: YNA'
    parent: YBG
  YBGH:
    name: 'Children’s interactive and activity: hidden object / search and discover'
    notes: 'Also class here: ‘magic eye’ or ‘3D’ books, optical illusions, wimmelbooks. Use for: material where aim is to
      look for and find item or character in pictures, or which have illustrations packed with details to find, but do not
      necessarily tell a story, See also: YNVP'
    parent: YBG
  YBGS:
    name: 'Children’s interactive and activity: papercrafts'
    notes: 'Also class here: origami, books of paper dolls to dress, paper models to make or assemble, things to cut out or
      punch-out, dioramas, paper folding, or other activities for children using paper or card'
    parent: YBG
  YBL:
    name: Early years / early learning concepts
    notes: 'Use all YBL* codes for: pre-school material only. Use all YBL* codes with: other YN* or YX*codes to give extra
      detail of a significant theme or topic if appropriate and one 5AB* INTEREST AGE qualifier'
    parent: YB
  YBLA:
    name: 'Early years: letters and words'
    notes: 'Also class here: ABC and alphabet books, first word books etc'
    parent: YBL
  YBLB:
    name: 'Early years: verse, rhymes and wordplay'
    notes: 'Also class here: nursery rhymes and simple verse for very young children, tongue-twisters etc, See also: YDP YFV'
    parent: YBL
  YBLC:
    name: 'Early years: numbers and counting'
    parent: YBL
  YBLD:
    name: 'Early years: colours'
    parent: YBL
  YBLF:
    name: 'Early years: opposites'
    parent: YBL
  YBLG:
    name: 'Early years: prewriting skills'
    notes: 'Also class here: Pre-handwriting skills, pregraphism or pre-graphics skills and activities, writing readiness
      skills, activities for learning to hold a pen or pen or pencil control and skills, tracing exercises and activities,
      tracing different types of lines, patterns and shapes. Use for: works that help children acquire the fundamental skills
      children need to develop before they are able to write or draw'
    parent: YBL
  YBLH:
    name: 'Early years: size, shapes and patterns'
    parent: YBL
  YBLJ:
    name: 'Early years: time and seasons'
    notes: 'Also class here: telling the time, day and night, days of the week, seasons of the year, etc'
    parent: YBL
  YBLL:
    name: 'Early years: nature and animals'
    notes: 'Also class here: baby animals'
    parent: YBL
  YBLM:
    name: 'Early years: daily routine'
    notes: 'Also class here: elements of daily life for very young children: bath time and washing, meals and eating, getting
      up, getting dressed, brushing teeth, looking after hair, etc'
    parent: YBL
  YBLM1:
    name: 'Early years: potty and toilet training'
    notes: 'Also class here: titles that talk about poo, wee and farts. Use for: works that explain bodily functions linked
      to going to the toilet, as well as titles for teaching children how to use a potty or toilet'
    parent: YBLM
  YBLN:
    name: 'Early years: first experiences'
    parent: YBL
  YBLN1:
    name: 'Early years: the body and the senses'
    notes: 'Also class here: sounds and noises, touch and feel, tastes and smells, fingers and toes, smiles and laughter,
      faces, peek-a-boo, hide-and-seek, etc'
    parent: YBLN
  YBLP:
    name: 'Early years: people who help us'
    parent: YBL
  YBLQ:
    name: 'Early years: family'
    notes: 'Use with: YXF* codes as appropriate'
    parent: YBL
  YBLT:
    name: 'Early years: things that go'
    notes: 'Also class here: books on ships, planes, trains, trucks, cars, bikes, buses, diggers, tractors, and other moving
      vehicles for the very young'
    parent: YBL
  YD:
    name: Children’s / Teenage poetry, anthologies, annuals
    notes: 'Use all YD* codes with: INTEREST AGE 5A* Qualifiers as appropriate'
    parent: Y
  YDA:
    name: 'Children’s / Teenage: Annuals / yearbooks / almanacs'
    notes: 'Also class here: all annuals, yearly publications, periodicals or similar aimed at children or teenagers. Use
      for: material published every year, usually dated and thematic. Use with: second Y* code indicating type or subject
      area where possible'
    parent: YD
  YDC:
    name: 'Children’s / Teenage: Anthologies'
    notes: 'Use with: other code denoting literary form where appropriate, e.g. with a YF* code for fiction anthologies, with
      YDP for poetry anthologies. Use alone for anthologies of various literary forms'
    parent: YD
  YDP:
    name: 'Children’s / Teenage: Poetry / poems'
    notes: 'See also: YBLB YFV'
    parent: YD
  YF:
    name: Children’s / Teenage fiction and true stories
    notes: 'Use all YF* codes with: one 5A* INTEREST AGE Qualifier; with PLACE 1*, TIME PERIOD 3* or INTEREST 5* Qualifiers
      where these aspects are particularly pertinent and significant; with appropriate non-fiction categories YN* or YX* to
      indicate key settings or topics of the narrative, but NOTE for ALL Children’s and teenage fiction the primary category
      MUST be an YF* code; with 5H*, 5J*, 5L* or 5P* qualifiers when these represent a significant topic or part of the appeal
      of the narrative; with 5X, where appropriate, to indicate material that may have themes or topics only be suitable for
      older or mature teenagers; with YB* to indicate the genre of a picture or chapter book; with YDC for fiction anthologies;
      YFZ* codes may be used to indicate special features of a fiction title. Prefer: X* codes for fiction told in comic book
      or manga form, See also: XA* XQ*'
    parent: Y
  YFA:
    name: 'Children’s / Teenage fiction: Classic fiction'
    notes: 'Use for: children’s and teenage fiction widely regarded or presented as ‘classic’ and typically but not necessarily
      published and in print for several decades'
    parent: YF
  YFB:
    name: 'Children’s / Teenage fiction: General, modern and contemporary fiction'
    notes: 'Use for: all contemporary non-genre fiction for children and teenagers. Use with: YX* or YN* codes to highlight
      the main theme of the story, for example, social issues, realistic or gritty fiction can be indicated using appropriate
      YX* codes, when the major theme is growing up or coming of age, use YXW, a story about illness use with YXL*, etc'
    parent: YF
  YFC:
    name: 'Children’s / Teenage fiction: Action and adventure stories'
    parent: YF
  YFCA:
    name: 'Children’s / Teenage fiction: Interactive adventure stories'
    notes: 'Use for: books, physical or digital, where the reader can select from options to alter the narrative outcome.
      Use with: other YF* code indicating genre, See also: YFZW'
    parent: YFC
  YFCB:
    name: 'Children’s / Teenage fiction: Thrillers / suspense'
    parent: YFC
  YFCF:
    name: 'Children’s / Teenage fiction: Crime and mystery fiction'
    parent: YFC
  YFCW:
    name: 'Children’s / Teenage fiction: Military and war fiction'
    parent: YFC
  YFD:
    name: 'Children’s / Teenage fiction: Horror and ghost stories, chillers, or other scary supernatural stories'
    notes: 'Also class here: scary stories of the paranormal, gothic ghost stories, contemporary and realistic horror stories.
      Use for: any story that is written to be scary or to give an age appropriate feeling of fear, including stories that
      turn out not to be scary, stories that feature ghosts (friendly or scary), monsters (frightening or misunderstood),
      witches (wicked or misrepresented), creepy settings, characters or beings, haunted houses or is any form of supernatural
      chilling, spooky or scary story. Use with: YNX* codes for stories about specific supernatural or paranormal beings,
      such as YNXB3 for ghost stories, or other YF* codes, such as YFQ for funny or comedy ghost or horror stories, YFJM for
      cautionary tales, YFH* for fantasy scary stories, YFHG for horror stories based on myths, YFHT for Dark fantasy horror
      stories, YFA for classic ghost or horror stories, etc, See also: YNXW'
    parent: YF
  YFE:
    name: 'Children’s / Teenage fiction: Speculative, dystopian and utopian fiction'
    notes: 'Also class here: fiction set in dystopian or utopian societies, alternative history fiction. Use with: YFG or
      other YF* codes if possible'
    parent: YF
  YFEB:
    name: 'Children’s / Teenage fiction: Apocalyptic and post-apocalyptic stories'
    notes: 'Also class here: end of the world stories, dying earth, collapsing or collapsed civilizations. Use for: stories
      set in worlds trying to prevent, or experiencing or that have already been affected by an apocalypse event, such as
      runaway climate change, an impact event, resource depletion, nuclear holocaust, pandemics, end times, zombie apocalypse,
      cybernetic revolts, technological singularity, invasion from space, dysgenics, etc'
    parent: YFE
  YFF:
    name: 'Children’s / Teenage fiction: Superhero stories'
    notes: 'Use for: stories for children or teenagers with a superhero character or where the main characters are depicted
      as superheroes'
    parent: YF
  YFG:
    name: 'Children’s / Teenage fiction: Science fiction'
    notes: 'Use with: YNTT for Time travel, time slip, or time loop sci-fi stories, YNXF for stories about extra-terrestrials
      or UFOs, YNNZ for stories about space travel, YNTC for stories about AI, Mecha, robots or new technology, etc'
    parent: YF
  YFGR:
    name: 'Children’s / Teenage fiction: Space opera'
    notes: 'Also class here: Galactic empires, interstellar or intergalactic wars. Use for: science fiction stories set in
      space, in imagined galaxies or universes, or on different planets, often with advanced cultures and sophisticated technology
      and usually featuring main characters who are children or teenagers'
    parent: YFG
  YFGS:
    name: 'Children’s / Teenage fiction: Steampunk'
    notes: 'Also class here: dieselpunk, cyberpunk, retrofuturism. Use for: science fiction based on an alternative world
      where, for example in the case of steampunk, 19th century steam power has emerged as the dominant technology'
    parent: YFG
  YFH:
    name: 'Children’s / Teenage fiction: Fantasy'
    notes: 'Also class here: paranormal fantasy, enchanted journeys, alternative worlds, accidental travel, portal fantasy,
      Isekai. Use all YFH* codes with: YNX* codes as appropriate, with YNXB* codes for stories featuring the paranormal or
      particular supernatural beings'
    parent: YF
  YFHB:
    name: 'Children’s / Teenage fiction: Epic fantasy / heroic fantasy'
    notes: 'Also class here: sword and sorcery fantasy, quest fantasy, high fantasy'
    parent: YFH
  YFHD:
    name: 'Children’s / Teenage fiction: Magical realism / Magical fantasy'
    notes: 'Also class here: Magical girl. Use for: works that incorporates fantastic, magical, mythical or supernatural elements
      into an otherwise real-world or mundane setting, or works where the magic itself – whether a magical object or a character
      with magical powers – is the subject of the story, rather than simply a means to an end. Use with: YNXW for stories
      about witches, wizards or magicians or YNXB* codes for other magical creatures'
    parent: YFH
  YFHG:
    name: 'Children’s / Teenage fiction: Mythic fantasy / Myths and Legends fiction'
    notes: 'Also class here: Myths or legends from any culture told or retold as fiction or in story form, mythological fiction,
      Arthurian fantasy, Classical fantasy (based on Greek and Roman myths), Shenmo (Gods and Demons), etc. Use for: fiction
      that is inspired by, or a retelling of, or that in some way draws from the characters, stories or themes of myth, legend,
      for example, a story based on a popular myth or character from a classic work in a modern setting or a story based on
      a minor character’s perspective, or that takes a ‘what if’ approach or create a mashup of different genres, for example,
      legendary character or hero meets dystopian future, or mythology crossed with contemporary adventure story. Use with:
      PLACE 1*, LANGUAGE 2*, INTEREST 5* Qualifiers to indicate if the story is taken from a particular tradition, See also:
      YNRU YFJ'
    parent: YFH
  YFHH:
    name: 'Children’s / Teenage fiction: Historical fantasy'
    notes: 'Also class here: Medieval, Dark Age, Arabian, Celtic, Gunpowder, Prehistoric, Wuxia fantasy. Use for: fantasy
      that incorporates fantastic elements, such as magic or supernatural beings, into recognisable historic settings, periods,
      cultures etc. Use with: PLACE 1* and/or TIME PERIOD 3* Qualifiers to indicate setting as appropriate'
    parent: YFH
  YFHK:
    name: 'Children’s / Teenage fiction: Comic (humorous) fantasy'
    parent: YFH
  YFHR:
    name: 'Children’s / Teenage fiction: Fantasy romance'
    notes: 'Also class here: Romantasy, romantic fantasy, vampire romance, paranormal romance etc. Use for: Fantasy stories
      using many of the elements and conventions of romance but that is primarily a fantasy novel. Use with: YNXB* codes for
      romance stories featuring the paranormal, supernatural or particular supernatural beings, 5X code if content is more
      explicit and INTEREST AGE 5A* Qualifiers as appropriate'
    parent: YFH
  YFHT:
    name: 'Children’s / Teenage fiction: Dark fantasy'
    notes: 'Use for: fantasy stories with darker and frightening themes, often incorporating elements of horror or that have
      a gloomy and threatening atmosphere or a sense of horror and dread'
    parent: YFH
  YFHW:
    name: 'Children’s / Teenage fiction: Contemporary and urban fantasy'
    notes: 'Use for: fantasy set in the present day or recognisably contemporary settings (according to the time period of
      its creator)'
    parent: YFH
  YFJ:
    name: 'Children’s / Teenage fiction and true stories: Cultural heritage / traditional stories'
    notes: 'Also class here: Fables, stories that have a long and continuous existence through multiple generations, stories
      that get told and retold, stories from particular cultural traditions, stories written down from oral traditions, tall
      tales, myths or legends retold in a story form. Use all YFJ* codes for: modern retellings in story form or collections
      of these type of traditional stories aimed at children / teenagers. Use with: PLACE 1*, LANGUAGE 2*, INTEREST 5* Qualifiers
      as appropriate, See also: YFHG'
    parent: YF
  YFJB:
    name: 'Children’s / Teenage fiction and stories: Folk and Fairy tales'
    notes: 'Also class here: Fairy tale retellings, fractured fairy tales. Use for: folk and fairy tales from any culture
      told in a story form, or retellings of these stories, stories inspired by fairy tales'
    parent: YFJ
  YFJH:
    name: 'Children’s / Teenage fiction and stories: Trickster tales'
    notes: 'Use for: stories that feature a trickster character such as a spirit, a deity, a human or an animal'
    parent: YFJ
  YFJK:
    name: 'Children’s / Teenage fiction and stories: Creation, founding, origin stories'
    notes: 'Use for: stories about the origins or beginnings of peoples, worlds, places, traditions, etc'
    parent: YFJ
  YFJM:
    name: 'Children’s / Teenage fiction and stories: Teaching stories'
    notes: 'Also class here: Cautionary tales, Wisdom tales. Use for: stories that were created for the transmission of wisdom,
      knowledge, cultural traditions, oral transmission of stories, or stories that warn or caution young people about specific
      dangers, to teach a lesson or a general moral issue'
    parent: YFJ
  YFK:
    name: 'Children’s / Teenage fiction: Religious and spiritual stories'
    notes: 'Also class here: Faith-inspired or inspirational stories. Use for: fiction that promotes a particular religious,
      spiritual or visionary message or viewpoint. Use with: 5PG* values from INTEREST 5* Qualifiers or YNR* codes, to indicate
      the religious tradition, as appropriate'
    parent: YF
  YFM:
    name: 'Children’s / Teenage fiction: Relationship stories'
    notes: 'Use for: stories that deal with all kinds of relationships with others; for stories where interpersonal relationships
      are the main theme; or explore the relationship of the main characters, stories that explore relationships within groups,
      relationships between young people. Use with: YX* to give details of kinds of relationships as appropriate, for example,
      YXH for stories about relationships in peer groups or relationships with adults from a young persons perspective, 5PHG
      for stories about found or chosen family, See also: YXHB'
    parent: YF
  YFMF:
    name: 'Children’s / Teenage fiction: Friendship stories'
    notes: 'Use for: stories where the main or primary topic or theme of the narrative is the friendship between different
      child or teenage main characters'
    parent: YFM
  YFMR:
    name: 'Children’s / Teenage fiction: Romance and love stories'
    notes: 'Also class here: contemporary romance, romantic comedy, romantic drama, stories of first or young love, teenage
      romances, teenage love-triangles, lost love, unrequited love, high school romance, etc. Use for: stories that are clearly
      of the romance genre and feature a romantic relationship as the core theme, that are specifically written for teenagers
      and deal with romance or love stories from a teenage point of view. Use with: YX* codes as appropriate, with YFT and
      TIME PERIOD 3* qualifiers for Historical romance, with YFQ for comic romance, etc, See also: YFHR'
    parent: YFM
  YFN:
    name: 'Children’s / Teenage fiction: Family and home stories'
    notes: 'Use for: titles where families, family members or home is the main theme of a story or for stories about topics
      to do with any kind of family. Use with: codes from YXF* sequence for fiction specifically designed to address family
      issues, or with 5PH* for stories about particular relationships within a family or types of family'
    parent: YF
  YFP:
    name: 'Children’s / Teenage fiction: Nature and animal stories'
    notes: 'Use for: stories featuring animals, or the natural world, or stories about human interaction or relationships
      with animals and the natural world, stories about the bond between a child and an animal or pet. Use with: YNN* codes
      to indicate what type of animal or nature story, for example YNNJ24 for Horse stories or YNN21 for stories about Dogs,
      YNNH* codes for stories about pets, YNNT for stories about plants or trees'
    parent: YF
  YFQ:
    name: 'Children’s / Teenage fiction: Humorous stories'
    notes: 'Also class here: Comical fiction, Stories that make you giggle or laugh, laugh out loud funny books. Use with:
      other YF* code indicating genre if possible'
    parent: YF
  YFR:
    name: 'Children’s / Teenage fiction: Sporting stories'
    notes: 'Use with: YNW* codes to indicate the sport in the story'
    parent: YF
  YFS:
    name: 'Children’s / Teenage fiction: School stories'
    notes: 'Also class here: back to school, going to a new school, school life, stories principally taking place in and around
      school, etc. Use with: values from 5L* to indicate what school level as appropriate'
    parent: YF
  YFT:
    name: 'Children’s / Teenage fiction: Historical fiction'
    notes: 'Use for: stories set in the past (usually before the writer’s lifetime), where the time period is a significant
      or essential part of the story and that portray the spirit, manners, and social conditions of that time with realistic
      detail. Use with: other YF* codes as appropriate, and PLACE 1* and/or TIME PERIOD 3* Qualifiers to indicate setting
      as appropriate'
    parent: YF
  YFU:
    name: 'Children’s / Teenage fiction: Short stories'
    notes: 'Use with: other YF* code indicating genre if possible'
    parent: YF
  YFV:
    name: 'Children’s / Teenage fiction: Stories in verse'
    notes: 'Use for: stories for children or teenagers written entirely in verse form rather than prose. Use with: other YF*
      or YBC* codes indicating genre if possible. Prefer: YDP for poems or collections of poetry, See also: YDP YBLB'
    parent: YF
  YFX:
    name: 'Children’s / Teenage fiction: Biographical fiction / autobiographical stories'
    notes: 'Also class here: fictional life writing, autobiographical stories, autofiction. Use for: highly fictionalised
      biographies or autobiographies of real people or where an author is using fictionalised versions of real life memories
      or experiences from their own life as an integral and major part of the narrative or story'
    parent: YF
  YFY:
    name: 'Children’s / Teenage fiction: True stories told as fiction'
    notes: 'Also class here: true events or true stories, e.g. of survival, discovery, conflict etc, told in strong narrative
      from, as if fiction. Use with: other Y Codes to give details of the topic and PLACE 1* and TIME PERIOD 3*, INTEREST
      5* qualifiers as appropriate'
    parent: YF
  YFZ:
    name: 'Children’s / Teenage fiction / Literature / Comics / Graphic novels: Special features and related items'
    notes: 'Use all YFZ* codes with: other YF* code indicating genre or type, YDP for poems, YNDS for plays, or YBCS for picture
      storybooks or XQ* codes for graphic novels, comic books or manga aimed at children or teenagers. NB: YFZ* codes should
      not usually be the primary or main subject code. DO NOT USE: YFZ itself - always use YFZ* codes'
    parent: YF
  YFZC:
    name: 'Children’s / Teenage fiction: Advent calendar stories'
    notes: 'Use for: stories aimed at children or teenagers, usually in 24 or 25 chapters or stories, meant to be read, heard
      or seen as a countdown to Christmas through the Advent season. Use with: 5HPDA'
    parent: YFZ
  YFZD:
    name: 'Children’s / Teenage fiction: stories as diaries / journals / letters'
    notes: 'Also class here: Epistolary fiction. Use for: fiction, often with illustrations, written or drawn in a series
      of documents, letters, diaries, emails, blogs, social media posts, doodles, etc. Use with: other YF* or XQ* code indicating
      genre or type'
    parent: YFZ
  YFZH:
    name: 'Children’s / Teenage fiction: retellings'
    notes: 'Use for: stories that are reworkings, reimagining’s or retellings of stories, histories or tales. Use with: other
      YF* or XQ* code indicating genre or type'
    parent: YFZ
  YFZR:
    name: 'Children’s / Teenage fiction: category / serialised stories'
    notes: 'Use for: genre fiction, or comic books usually published on a monthly basis, short, in clearly delineated lines
      and with a certain number published every month. Use with: other YF* or XQ* code indicating genre or type. YFZR codes
      should never be the main subject code'
    parent: YFZ
  YFZS:
    name: 'Children’s / Teenage fiction: Ranobe (‘light novels’)'
    notes: 'Also class here: Illustrated novellas. Use for: short fiction for children or teenagers, usually driven primarily
      by dialogue and character, and generally accompanied by illustrations in manga/anime or similar styles. Use with: other
      YF* codes to indicate the genre'
    parent: YFZ
  YFZT:
    name: 'Children’s / Teenage fiction: Stories in translation'
    notes: 'Use for: fiction in translation from another language. Use with: YF*, YBCS, YDP, YNDS, or XQ* codes to ensure
      classification is meaningful beyond the translation of the work itself and with 5T* - Literature of Place Qualifiers
      as appropriate. DO NOT USE: PLACE 1* or LANGUAGE 2* Qualifiers to describe the detail of the original language, this
      would be described elsewhere and not using Thema. You may still use a PLACE Qualifier if it is relevant to the plot
      or setting of the book. DO NOT USE: YFZT as the main or primary subject or the only code'
    parent: YFZ
  YFZV:
    name: 'Children’s / Teenage fiction: Stories Inspired by or adapted from other media'
    notes: 'Use for: stories that were published as spin-offs or companions to pre-existing non-book media or merchandise,
      for example story books based on a popular film franchise, toy, an online game or a TV series. DO NOT USE: for titles
      that were subsequently made into films etc. Use with: other YF*, YBCS, YDP, YNDS, or XQ* codes indicating genre or type.
      NB: YFZV codes should never be the main subject code'
    parent: YFZ
  YFZW:
    name: 'Children’s / Teenage fiction: Game-related / LitRPG stories'
    notes: 'Also class here: Literary Role Playing Game, GameLit, RoLit. Use for: fiction that is structured like a videogame,
      or features the same kind of challenges as would be found in a game, or is about or set in a videogame. Use with: other
      YF* or XQ* codes as appropriate, See also: YFCA'
    parent: YFZ
  YFZZ:
    name: 'Children’s / Teenage fiction: Companion works'
    notes: 'Use for: companion works to popular children’s or teenage fiction series or titles, typically uncritical, such
      as an atlas or map of a mythical world or fictional universe, a compendium of characters or objects, a guide to the
      series, art inspired by or taken from the series etc. Use with: other Y* codes or on its own as appropriate, or with
      X* codes for companion works to graphic novels, comics, manga aimed at children or teenagers'
    parent: YFZ
  YN:
    name: 'Children’s / Teenage: General interest'
    notes: 'Use for: all general interest material not covered elsewhere and not designed specifically for school use. Use
      all YN* codes for: non-fiction works. Use all YN* codes with: INTEREST AGE 5A* Qualifiers, with relevant YF* code for
      fiction on specific topics, as appropriate. NB: YN may be used with A* – W* codes to indicate the topic when there is
      no more specific Y* code or qualifier but if mixing YN codes with A* – W* codes, the YN code or another Y* code MUST
      be designated as the Main Subject and sent with a 5A* qualifier'
    parent: Y
  YNA:
    name: 'Children’s / Teenage general interest: Art and artists'
    notes: 'Also class here: painters, paintings, photography and photographers, etc. Use with: STYLE 6* Qualifiers as appropriate,
      YNB for biographies, YNP for practical, how to titles'
    parent: YN
  YNB:
    name: 'Children’s / Teenage general interest: Biography and autobiography'
    notes: 'Also class here: biographies of people from the past and present. Use for: both individual biographies and works
      that have multiple biographies of different people, titles about heroes or heroines, inspirational figures, famous and
      everyday people, diaries or journals of individuals. Use with: other YN* codes for particular genres of biography'
    parent: YN
  YNC:
    name: 'Children’s / Teenage general interest: Music and musicians'
    notes: 'Also class here: titles about music, or particular musicians, pop groups, etc. Use with: STYLE 6* Qualifiers as
      appropriate, YNB for biographies of singers, musicians or groups'
    parent: YN
  YNCB:
    name: 'Children’s / Teenage general interest: Musical instruments'
    notes: 'Also class here: musical instruction, learning to play the piano, the recorder, the guitar, musical scores, etc.
      Use with: AVR* codes to indicate specific instruments if more detail is appropriate. NB: if mixing Y* codes with AVR*
      codes, the Y* code MUST be designated as the Main Subject and sent with a 5A* qualifier'
    parent: YNC
  YNCS:
    name: 'Children’s / Teenage general interest: Songbooks / singing'
    notes: 'Also class here: song scores, sing along, learning to sing. Use with: STYLE 6* Qualifiers as appropriate'
    parent: YNC
  YND:
    name: 'Children’s / Teenage general interest: Drama and performing arts'
    notes: 'Also class here: circus, acting techniques, stagecraft, theatre, auditions, etc. Use with: STYLE 6* Qualifiers
      as appropriate, or with YNB for biographies of performers'
    parent: YN
  YNDB:
    name: 'Children’s / Teenage general interest: Dance, ballet'
    notes: 'Also class here: learning to dance. Use with: STYLE 6* Qualifiers as appropriate, or with YNB for biographies
      of dancers or dance groups'
    parent: YND
  YNDS:
    name: 'Children’s / Teenage general interest: Playscripts'
    parent: YND
  YNF:
    name: 'Children’s / Teenage general interest: Television, video and film'
    notes: 'Also class here: titles about making of a film, TV, series, streaming, digital filmmaking, animation, radio, podcasting,
      etc. Use with: STYLE 6* Qualifiers as appropriate, or with YNB for biographies of actors, TV, film or video stars, personalities
      or celebrities'
    parent: YN
  YNG:
    name: 'Children’s / Teenage general interest: General knowledge and interesting facts'
    parent: YN
  YNGL:
    name: 'Children’s / Teenage general interest: Information resources'
    notes: 'Also class here: titles about libraries, museums, schools, using and finding information, guides to using information
      resources, etc. Use for: informative books about museums, galleries, libraries other cultural centres, and their content'
    parent: YNG
  YNH:
    name: 'Children’s / Teenage general interest: History and the past'
    notes: 'Also class here: archaeology, histories of countries, places, peoples, cultures, groups, etc. Use with: PLACE
      1*, LANGUAGE 2*, TIME PERIOD 3*, INTEREST 5* or STYLE 6* Qualifiers as appropriate, for histories of particular civilizations,
      places, peoples, groups, styles or periods of human prehistory and history and with YNB for biographies of specific
      people from the past, YR* codes for encyclopaedias, timelines of history, or other Y* codes for histories of particular
      topics for children or teenagers, See also: YNB YPJH'
    parent: YN
  YNHA:
    name: 'Children’s / Teenage general interest: Adventurers and outlaws'
    notes: 'Also class here: treasure hunters, seafarers, famous individual or groups of heroes or villains from history,
      stories of people from the past who were adventurers or heroes, etc. Use with: with YNB for biographies and PLACE 1*
      and/or TIME PERIOD 3* Qualifiers as appropriate, See also: YNB'
    parent: YNH
  YNHA1:
    name: 'Children’s / Teenage general interest: Pirates'
    parent: YNHA
  YNHD:
    name: 'Children’s / Teenage general interest: Discovery and exploration'
    notes: 'Also class here: explorers, travellers, expedition, first contacts with other continents and peoples, exploring
      interiors, the seas, or stories of people who were travellers, voyagers, pioneers or explorers etc. Use with: with YNB
