  YNWD4:
    name: 'Children’s / Teenage general interest: Ball games and sports: Basketball'
    notes: 'Also class here: korfball, street basketball, streetball, slamball, wheelchair basketball, 3 on 3'
    parent: YNWD
  YNWD5:
    name: 'Children’s / Teenage general interest: Ball games and sports: Cricket'
