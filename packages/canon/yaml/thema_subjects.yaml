    parent: YNW
  YNWJ:
    name: 'Children’s / Teenage general interest: Martial arts'
    notes: 'Also class here: Aikido, Capoeira, Judo, Ju-jitsu, Karate, Kendo, Chinese martial arts / Kung-Fu, Tai Chi, Qigong,
      Sumo, Taekwondo, Mixed martial arts, etc. NB: YNWJ may be used with SR* codes for greater clarity but if mixing YNWJ
      with SR* codes, one Y* code MUST be designated as the Main Subject and sent with a 5A* code'
    parent: YNW
  YNWK:
    name: 'Children’s / Teenage general interest: Tennis and other racket sports'
    notes: 'Also class here: Tennis, badminton, squash and racquets, table tennis, pelota, etc. NB: YNWK may be used with
      SFT* codes for greater clarity but if mixing YNWK with SFT* codes, one Y* code MUST be designated as the Main Subject
      and sent with a 5A* code'
    parent: YNW
  YNWM:
    name: 'Children’s / Teenage general interest: Winter sports'
