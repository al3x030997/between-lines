  YNWM1:
    name: 'Children’s / Teenage general interest: Winter sports: Skiing'
    notes: 'Also class here: snowboarding'
    parent: YNWM
  YNWM2:
    name: 'Children’s / Teenage general interest: Winter sports: Ice hockey'
    parent: YNWM
  YNWP:
    name: 'Children’s / Teenage general interest: Camping and active outdoor pursuits'
    notes: 'Also class here: hiking, walking, trekking, climbing, orienteering, outdoor skills, caving, fishing. NB: YNWP
      may be used with SZ* or SV* codes for greater clarity but if mixing YNWP with SZ* or SV* codes, one Y* code MUST be
      designated as the Main Subject and sent with a 5A* code'
    parent: YNW
  YNWT:
    name: 'Children’s / Teenage general interest: Vehicle sports'
    notes: 'Also class here: motor sports, car racing, motorcycle racing, kart racing, air sports and recreations, sailing
      and boat sports. NB: YNWT may be used with SM* codes for greater clarity but if mixing YNWT with SM* codes, one Y* code
      MUST be designated as the Main Subject and sent with a 5A* code'
    parent: YNW
  YNWW:
    name: 'Children’s / Teenage general interest: Swimming and boat, paddle and other water sports and activities'
    notes: 'Also class here: diving, surfing, water skiing, paddleboarding, canoeing, kayaking, rowing, boating and sailing.
      Use for: titles about sports or activities on or in water. NB: YNWW may be used with SP* codes for greater clarity but
      if mixing YNWW with SP* codes, one Y* code MUST be designated as the Main Subject and sent with a 5A* code'
    parent: YNW
  YNWY:
    name: 'Children’s / Teenage general interest: Cycling, rollerskating and skateboarding'
    notes: 'NB: YNWY may be used with SM* or SMX codes for greater clarity but if mixing YNWY with SM* codes, one Y* code
      MUST be designated as the Main Subject and sent with a 5A* code'
    parent: YNW
  YNWZ:
    name: 'Children’s / Teenage general interest: Sports teams and clubs'
    notes: 'Use with: other YNW* code indicating sport'
    parent: YNW
  YNX:
    name: 'Children’s / Teenage general interest: Mysteries and the unexplained'
    notes: 'Also class here: the paranormal, superstitions, pseudoscience, astrology, horoscopes, fortune-telling, tarot,
      etc. NB: YNX* codes can be used with VX* codes to give greater detail if appropriate and if there is no more precise
      Y* code but if using VX* codes with YNX* codes then a Y* code MUST always be classed as the Main Subject and sent with
      a 5A* code'
    parent: YN
  YNXB:
    name: 'Children’s / Teenage general interest: Supernatural and mythological creatures'
    notes: 'Also class here: monsters and legendary beings, mythical beasts, magical creatures. Use all YNXB* codes with:
      YB* or YF* codes for supernatural or paranormal stories about, or featuring any of these creatures or encounters with
      them'
    parent: YNX
  YNXB1:
    name: 'Children’s / Teenage general interest: Dragons'
    notes: 'Use with: YB* or YF* codes for stories about or featuring or encounters with dragons or similar creatures or beings'
    parent: YNXB
  YNXB2:
    name: 'Children’s / Teenage general interest: Vampires, werewolves and shapeshifters'
    notes: 'Also class here: were-animals, skin changers. Use with: YB* or YF* codes for stories about or featuring or encounters
      with any of these shapeshifting or similar beings that can transform or change appearances'
    parent: YNXB
  YNXB3:
    name: 'Children’s / Teenage general interest: Zombies, ghosts and the undead'
    notes: 'Also class here: friendly or scary ghosts, phantoms, spectres, mummies, skeletons, ghouls, poltergeists, haunted
      houses or other haunted places, hauntings, ghosts as benevolent spirits, or malevolent entities, encounters or sitings
      of ghosts, etc. Use with: YB* or YF* codes for ghost stories or other stories about or featuring these beings in any
      form or stories of hauntings or encounters with them'
    parent: YNXB
  YNXB4:
    name: 'Children’s / Teenage general interest: Fairies, elves, or similar magic-like beings or folk'
    notes: 'Also class here: Goblins, hobgoblins, household spirits, pixies, flower fairies, the Tooth fairy, Huldufólk, hidden
      people, leprechauns, sprites, brownies, fair folk, fairyland, fairy rings, gnomes, imps, the little people, fairy godmothers,
      Christmas elves, Sandman, or any other similar elf-like or fairy-like beings. Use with: YB* or YF* codes for stories
      about or featuring any of these beings'
    parent: YNXB
  YNXB5:
    name: 'Children’s / Teenage general interest: Unicorns'
    notes: 'Use with: YB* or YF* codes for stories about or featuring, or encounters with unicorns or similar creatures or
      animals'
    parent: YNXB
  YNXB6:
    name: 'Children’s / Teenage general interest: Mermaids / mermen / merfolk'
    notes: 'Also class here: sirens, water spirits, kelpies, selkies, seal folk. Use with: YB* or YF* codes for stories about
      or featuring any of these beings or similar water folk, beings or spirits'
    parent: YNXB
  YNXB7:
    name: 'Children’s / Teenage general interest: Giants, trolls and other mythical humanoids'
    notes: 'Also class here: dwarves, ogres, gnomes, bigfoot, yetis. Use for: legendary, folkloric, or mythological creatures
      that are part human, or that resemble humans or encounters with them. Use with: YB* or YF* codes for stories about or
      featuring any of these beings'
    parent: YNXB
  YNXF:
    name: 'Children’s / Teenage general interest: UFOs and extraterrestrial beings'
    notes: 'Also class here: aliens, flying saucers. Use with: YB* or YF* codes for stories about or featuring or encounters
      with extraterrestrial life, UFOS or any other being from outer space'
    parent: YNX
  YNXW:
    name: 'Children’s / Teenage general interest: Witches, wizards and magicians'
    notes: 'Also class here: Sorcerers, enchanters, magic users. Use with: YB* or YF* codes for stories about or featuring
      users of magic, witches and witchcraft or spellcraft, See also: YFD'
    parent: YNX
  YP:
    name: Educational material
    notes: 'Also class here: Content for learning, teaching materials, instructional material, study material, educational
      resources, home learning resources. Use all YP* codes for: pre-primary, primary and secondary educational material,
      including schoolbooks, textbooks, revision material, exam preparation, material aimed at use in classes, or as self-study
      or for learning from home, and usually as part of a structured approach to learning, etc. For material aimed at higher
      education, for apprenticeship style and adult vocational qualifications, prefer non Y* subject code as appropriate.
      Use all YP* codes with: at least one EDUCATIONAL PURPOSE 4* Qualifier as appropriate, plus one 5A* Qualifier if age
      appropriateness also important, use with JNU or JNUM as Main subject when the material is meant for the educator or
      teacher to use. NB: YP* codes may be used with other Y* codes or codes A*– W* for textbooks that cover a specific aspect
      of the topic, but the YP* code MUST always be the Main subject to indicate it is educational material for young people
      – except when used with JNU or JNUM, See also: JNU JNUM'
    parent: Y
  YPA:
    name: 'Educational: Arts, general'
    notes: 'Use with: STYLE Qualifiers 6 * where appropriate'
    parent: YP
  YPAB:
    name: 'Educational: Art and design'
    notes: 'Use with: STYLE Qualifiers 6 * where appropriate'
    parent: YPA
  YPAD:
    name: 'Educational: Music'
    notes: 'Use with: STYLE Qualifiers 6 * where appropriate'
    parent: YPA
  YPAF:
    name: 'Educational: Drama and performance arts'
    notes: 'Also class here: playscripts for schools, dance'
    parent: YPA
  YPAG:
    name: 'Educational: Fashion and textile'
    parent: YPA
  YPAK:
    name: 'Educational: Handicrafts'
    notes: 'Also class here: maker and hacker spaces, Sloyd, traditional arts and crafts in the classroom. Use for: material
      that combine practical approaches from cross curriculum subjects'
    parent: YPA
  YPC:
    name: 'Educational: Language, literature and literacy'
    notes: 'Use all YPC* codes with: LANGUAGE 2* Qualifiers as appropriate'
    parent: YP
  YPCA:
    name: 'Educational: First / native language'
    notes: 'Use all YPCA* codes for: educational material, designed for school or home use, guided learning or self-study,
      for use with teachers, educators or parents, for learning or improving a main or primary language or languages, often
      a students or learners family or home language, or the main language or languages of a society. Use all YPCA* codes
      with: LANGUAGE 2* Qualifiers as appropriate'
    parent: YPC
  YPCA1:
    name: 'Educational: First / native language: Basic literacy'
    notes: 'Use for: books aimed at teaching or encouraging primary skills such as letter and word recognition and formation'
    parent: YPCA
  YPCA2:
    name: 'Educational: First / native language: Reading and writing skills'
    notes: 'Also class here: learning to read, learning to write. Use for: books aimed at teaching or encouraging independent
      reading and writing, reading comprehension, creative writing skills, linguistic or whole word reading, multi-sensory
      reading'
    parent: YPCA
  YPCA21:
    name: 'Educational: First / native language: Readers and reading schemes'
    notes: 'Also class here: Guided reading schemes, levelled readers, learning to read book schemes. Use for: books that
      are part of a structured ‘learning to read’ scheme suitable for school and/or home use, reading schemes for guided and
      structured reading, for use with guidance by educators, parents or for self-learning, usually graded by language level
      and breadth of vocabulary. Use with: EDUCATIONAL PURPOSE 4* Qualifiers, and other Children’s and Teenage subject codes
      - YB*, YF* YN*, YX* or XQ* - to indicate if they are stories or general interest'
    parent: YPCA2
  YPCA22:
    name: 'Educational: First / native language: Handwriting skills'
    parent: YPCA2
  YPCA23:
    name: 'Educational: First / native language: Spelling and vocabulary'
    parent: YPCA2
  YPCA24:
    name: 'Educational: First / native language: Reading and writing skills: Phonics'
    notes: 'Also class here: Phonic reading and writing. Use for: educational material for schools or home use that takes
      a phonics approach to learning to read and / or write'
    parent: YPCA2
  YPCA4:
    name: 'Educational: First / native language: Grammar and punctuation'
    parent: YPCA
  YPCA5:
    name: 'Educational: First / native language: Speaking skills'
    parent: YPCA
  YPCA9:
    name: 'Educational: First / native language: Literature studies'
    notes: 'Use for: educational material for the study of literature – fiction, prose, poetry, drama, etc – in a student‘s
      primary language; or material, including book guides, study notes about particular titles aimed at school students'
    parent: YPCA
  YPCA91:
    name: 'Educational: First / native language: School editions of literature texts'
    notes: 'Use for: editions of literature texts – fiction, prose, poetry, drama, etc – that have been specifically adapted
      for school or educational use, often with supplementary material such as notes, exercises, questions, etc. Use with:
      LANGUAGE 2* and EDUCATIONAL PURPOSE 4* Qualifiers and subject codes from YF* to specify the type of literature text'
    parent: YPCA9
  YPCK:
    name: 'Educational: Modern (non-native or second) languages'
    notes: 'Use all YPCK* codes for: educational material for learning or improving a secondary language or languages, so
      usually a language that is not one of the primary languages of the learner. Use all YPCK* codes with: LANGUAGE 2* Qualifiers
      as appropriate'
    parent: YPC
  YPCK2:
    name: 'Educational: Modern (non-native or second) languages: Language learning'
