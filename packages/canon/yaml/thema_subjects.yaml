      aimed at school students'
    parent: YPCK
  YPCK91:
    name: 'Educational: Modern (non-native or second) languages: School editions of literature texts'
    notes: 'Use for: editions of literature texts – fiction, prose, poetry, drama, etc – that have been specifically adapted
      for school or educational use, often with supplementary material such as notes, exercises, questions, etc. Use with:
      LANGUAGE 2* and EDUCATIONAL PURPOSE 4* Qualifiers and subject codes from YF* to specify the type literature text'
    parent: YPCK9
  YPCS:
    name: 'Educational: Classical and ancient languages'
    notes: 'Use all YPCS* codes with: LANGUAGE 2* Qualifiers as appropriate'
    parent: YPC
  YPCS4:
    name: 'Educational: Classical and ancient languages: Language learning'
    parent: YPCS
  YPCS9:
    name: 'Educational: Classical and ancient languages: Literature studies'
    notes: 'Use for: educational material for the study of literature – prose, poetry, drama, etc – in a classical or ancient
