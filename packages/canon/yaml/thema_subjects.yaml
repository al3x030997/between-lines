      level. NB: YPMT3 may be used with T* codes for more specialised engineering material but the YPMT3 code MUST always
      be the Main subject to indicate it is educational material for young people'
    parent: YPMT
  YPMT4:
    name: 'Educational: Food technology, cooking skills'
    notes: 'Also class here: Educational: nutrition, food preparation and cookery, food safety, See also: YPWC4'
    parent: YPMT
  YPMT5:
    name: 'Educational: Electronics'
    notes: 'Also class here: Educational: electronic products, systems and technology, electricity'
    parent: YPMT
  YPMT6:
    name: 'Educational: IT and computing, ICT'
    notes: 'Also class here: digital competencies or skills, coding or programming classes, information and communication
      technology, computer studies, digital citizenship'
    parent: YPMT
  YPMT7:
    name: 'Educational: Technical drawing'
    parent: YPMT
  YPMT8:
    name: 'Educational: Woodwork, metalwork, etc'
    parent: YPMT
  YPW:
    name: 'Educational: Vocational and other subjects'
    notes: 'Use for: material aimed at pupils in primary or secondary education. Use with: appropriate EDUCATIONAL PURPOSE
      4* qualifiers. NB: YPW* codes may be used with T* or other codes for more specialised vocational material but the YPW*
      code MUST always be the Main subject to indicate it is educational material for young people'
    parent: YP
  YPWB:
    name: 'Educational: Family and consumer sciences / domestic management'
    notes: 'Use for: material for pupils that deal with the economics and management of the home, the family and relationships
      with the wider community'
    parent: YPW
  YPWC:
    name: 'Educational: Other vocational education and training'
    notes: 'Use for: all vocational subjects taught at secondary level schools not listed separately. Use with: appropriate
      EDUCATIONAL PURPOSE 4* qualifiers. NB: YPWC* codes may be used with T* or other codes for more specialised vocational
      material but the YPWC* code MUST always be the Main subject to indicate it is educational material for young people'
    parent: YPW
  YPWC1:
    name: 'Educational: Health and social care'
    notes: 'Use for: material for pupils about professions linked to adult health and social care'
    parent: YPWC
  YPWC2:
    name: 'Educational: Child care / Child development'
    notes: 'Use for: material for pupils about professions linked to child care'
    parent: YPWC
  YPWC3:
    name: 'Educational: Sales and retail skills'
    notes: 'Use for: material for pupils about sales / retail sector'
    parent: YPWC
  YPWC4:
    name: 'Educational: Hospitality, catering, leisure and tourism'
    notes: 'Use for: material for pupils about the leisure industry, travel, tourism, hotels, food and drinks service, See
      also: YPMT4'
    parent: YPWC
  YPWC5:
    name: 'Educational: Hairdressing, salon and beauty therapy skills'
    notes: 'Use for: material for pupils about cosmetology, skin care, haircare, barbering, art of makeup, spa skills and
      other education specialities linked to beauty treatment or personal grooming, See also: TTVH'
    parent: YPWC
  YPWC9:
    name: 'Educational: Work experience / Careers'
    notes: 'Use for: material for pupils about the world of work, the skills needed, placements'
    parent: YPWC
  YPWD:
    name: 'Educational: Construction, building and related skills'
    notes: 'Also class here: Built Environment, Building Engineering. Use for: material for pupils about topics in the construction
      and related sectors. NB: YPWD codes may be used with TN* codes for more specialised vocational material but the YPWD
      code MUST always be the Main subject to indicate it is educational material for young people, See also: TNT'
    parent: YPW
  YPWE:
    name: 'Educational: Agriculture, horticulture and related subjects'
    notes: 'Also class here: fishing, forestry, animal care and management, arboriculture, countryside management, blacksmithing,
      etc. Use for: material for pupils about topics in the rural or land-based sectors. NB: YPWE codes may be used with TV*
      codes for more specialised vocational material but the YPWE code MUST always be the Main subject to indicate it is educational
      material for young people'
    parent: YPW
  YPWF:
    name: 'Educational: Physical education'
    notes: 'Also class here: Sports studies, gym class, physical training (PT). Use for: material for pupils related to maintaining
      the human body through physical exercises and sports'
    parent: YPW
  YPWG:
    name: 'Educational: Transport, logistics and related skills'
    notes: 'Also class here: distribution, driving skills. Use for: material for pupils about topics in these sectors. NB:
      YPWG codes may be used with T* or K* codes for more specialised vocational material but the YPWG code MUST always be
      the Main subject to indicate it is educational material for young people, See also: TR*'
    parent: YPW
  YPWL:
    name: 'Educational: General studies, educational skills and competencies'
    notes: 'Use for: educational material that takes a multi-disciplinary approach to the world the student lives in or teaches
      pupils general skills or competencies'
    parent: YPW
  YPWL1:
    name: 'Educational: General knowledge'
    notes: 'Use for: educational material that gives a broad sweep of general knowledge or culture or teaches cultural awareness
      and expression'
    parent: YPWL
  YPWL2:
    name: 'Educational: Study skills'
    notes: 'Use for: general material that teaches skills needed for studying or learning efficiently, such as functional
      skills, learning techniques, organizational skills, writing techniques, note taking, research skills, library skills,
      etc'
    parent: YPWL
  YPWL3:
    name: 'Educational: Memory skills and creative thinking'
    notes: 'Use for: general material that teaches pupils thinking skills, including initiative'
    parent: YPWL
  YPWL4:
    name: 'Educational: Social and life skills'
    notes: 'Use for: general material that teaches pupils skills for interaction with others or dealing with daily life'
    parent: YPWL
  YPWN:
    name: 'Educational: Uniformed public or protective services'
    notes: 'Use for: material aimed at pupils preparing for one of the uniformed public or protective services, such as the
      fire service, paramedics, police or armed services. NB: YPWN codes may be used with JKSW* or JWC* codes for more specialised
      vocational material but the YPWN code MUST always be the Main subject to indicate it is educational material for young
      people'
    parent: YPW
  YPZ:
    name: 'Educational: Study and revision guides'
    notes: 'Use for: ALL study and revision guides or supplementary workbook / exercise books for primary and secondary education,
      notes or resumes of texts or subjects meant to help students study or revise a particular aspect of a subject or a specific
      work. Use with: relevant YP* code above indicating subject where possible'
    parent: YP
  YPZH:
    name: 'Educational: School holiday / vacation workbook'
    notes: 'Use for: instructional study material or activity books, meant to complement formal educational structures, usually
      designed for learning during the long holiday between educational years or grades, usually meant to revise topics already
      learnt and prepare for the transition to the next educational year or grade, and often presented in a fun, activity
      based format. Use with: EDUCATIONAL 4* qualifiers to indicate levels, plus use with other YP* codes for particular subjects
      or just YPZH if it covers all the main subjects covered in an academic year'
    parent: YPZ
  YPZN:
    name: 'Educational: Non-Verbal reasoning / visual reasoning'
    notes: 'Use for: material about problem solving using pictures and diagrams, or material aimed at improving the ability
      to understand and analyse visual information and solve problems, such as, identifying relationships, similarities and
      differences between shapes and patterns, recognizing visual sequences and relationships between objects, and remembering
      these'
    parent: YPZ
  YPZP:
    name: 'Educational: Verbal reasoning'
    notes: 'Use for: material about problem solving using words and letters, or material aimed at improving understanding,
      thinking or reasoning using concepts framed in words, or material that helps evaluate the ability to think constructively,
      rather than just simple fluency or vocabulary recognition'
    parent: YPZ
  YR:
    name: Children’s / Teenage reference material
    notes: 'Use with: other Y* codes to indicate subject of reference material'
    parent: Y
  YRD:
    name: 'Children’s / Teenage reference: Dictionaries and Languages'
    notes: 'Also class here: monolingual dictionaries for school or home use, other language reference works and titles about
      languages and language skills, word lists, vocabulary, grammar, usage guides, etc. Use all YRD* codes with: LANGUAGE
      2* Qualifiers, as appropriate. Prefer: YPC* codes for materials for use in a formal educational structure, See also:
      YPC*'
    parent: YR
  YRDC:
    name: 'Children’s / Teenage reference: Picture dictionaries'
    parent: YRD
  YRDL:
    name: 'Children’s / Teenage reference: Bilingual / multilingual dictionaries'
    parent: YRD
  YRDM:
    name: 'Children’s / Teenage reference: Non-native or second language study and reference'
    notes: 'Also class here: self-study or home language learning materials, word or vocabulary books etc. Use for: any titles,
      independent of format, aimed at helping young people learn or improve non-maternal language skills'
    parent: YRD
  YRE:
    name: 'Children’s / Teenage reference: Encyclopaedias, general reference'
    notes: 'Use for: non-subject-specific works only; for subject-specific reference works, use YRG'
    parent: YR
  YRG:
    name: 'Children’s / Teenage reference: Subject-specific reference'
    notes: 'Also class here: subject specific dictionaries / glossaries. Use with: another Y* code indicating the subject
      or scope of the reference work, YP* codes for material designed for education'
    parent: YR
  YRW:
    name: 'Children’s / Teenage reference: Atlases and maps'
    notes: 'Use for: collections of maps for children, atlases that present different topics for children. Use with: other
      Y* codes as appropriate and with: PLACE 1* Qualifiers, as appropriate'
    parent: YR
  YX:
    name: 'Children’s / Teenage: Personal and social topics'
    notes: 'Also class here: problems, issues, debates or challenges for youth or young people, situations and skills associated
      with these topics. Use all YX* codes: for titles dealing with any of these subjects either as non-fiction, factual approach
      or through stories or narratives. Use all YX* codes with: appropriate YF* code for fiction, stories or narratives where
      the main themes are personal or social topics, or with other Y* or XQ* codes to give greater detail for works dealing
      with these topics or issues through other subjects, with 5* INTEREST qualifiers when topics applies to particular interests.
      NB: YX may be used with J* or VF* codes to indicate there is no specific Y* code or qualifier but if mixing YX codes
      with J* or VF* codes, the YX code or another Y* code must be designated as the Main Subject and sent with a 5A* qualifier'
    parent: Y
  YXA:
    name: 'Children’s / Teenage personal and social topics: Body and health'
    notes: 'Also class here: advice for sleeping well, brushing teeth, dental and mouth hygiene, visiting the dentist, looking
      after the body, hygiene topics. Use for: popular health approaches to looking after the body, health and well-being.
      Use with: YXL* codes for mental health topics linked to the body and health'
    parent: YX
  YXAB:
    name: 'Children’s / Teenage personal and social topics: Fitness, exercise and healthy eating'
    notes: 'Also class here: personal health and hygiene, taking care of teeth, looking after your body, being active, food
      and health, nutrition and diet, topics around weight, veganism, vegetarianism, workouts and fitness routines for young
      people'
    parent: YXA
  YXAD:
    name: 'Children’s / Teenage personal and social topics: Yoga, meditation, mindfulness'
    notes: 'Use for: works about yoga or related practical techniques for mental and physical health and well-being for young
      people'
    parent: YXA
  YXAM:
    name: 'Children’s / Teenage personal and social topics: Hair and hair care'
    notes: 'Also class here: taking care of hair, brushing hair, titles about loving your hair, hair loss, alopecia, hairdos
      and hairstyles, etc'
    parent: YXA
  YXAX:
    name: 'Children’s / Teenage personal and social topics: Sex education and the facts of life'
    notes: 'Use for: works that discuss or explain to young people aspects of sex and sexuality advice including, but not
      limited to, maturing, consent, sexual relationships, physical intimacy, sexual health, sexual attraction, sexuality
      and social media, sexual boundaries, talking about sex, contraception, birth control, dealing with sexual pressure,
      where do babies come from, pregnancy, etc'
    parent: YXA
  YXAX1:
    name: 'Children’s / Teenage personal and social topics: puberty'
    notes: 'Also class here: works that explain puberty and the changes to the body, periods, menstruation, the menstrual
      cycle, changes to moods, hormonal changes, etc'
    parent: YXAX
  YXB:
    name: 'Children’s / Teenage personal and social topics: LGBTQIA+'
    notes: 'Use for: works that discuss or explain to young people aspects of LGBTQIA+ or queer life, culture, identities,
      history, events, health, wellbeing, sexuality, relationships, biographies, stories, dealing with prejudice, discrimination
      or any of the multiple aspects of LGBTQIA+ life. Use with: 5PSG, 5PSL, 5PT, 5PU, 5PV, 5PW or other 5* INTEREST Qualifiers
      as appropriate or YF* codes for stories that are about these topics, any YN* or other YX* codes for general interest
      or non-fiction works, for example, YXA* for works about health or body, YNH for LGBTQIA+ history, YNB for biographies,
      YXQ* for works about violence or abuse based on LGBTQIA+ identity, etc'
    parent: YX
  YXBD:
    name: 'Children’s / Teenage: LGBTQIA+: Coming out'
    notes: 'Use for: works that tell stories of, examine or give advice to young people about LGBTQIA+ person‘s process of,
      or journey to, recognition, personal acceptance and disclosure to others of their sexual orientation or gender identity.
      Use with: other subject codes and 5P* INTEREST Qualifiers as appropriate'
    parent: YXB
  YXC:
    name: 'Children’s / Teenage personal and social topics: Gender identity'
    notes: 'Use for: titles that deal with anything to do with gender for young people, for example what it means to be a
      girl or boy or questions about identity. Use with: other codes as appropriate to give more information, See also: YNMF
      YNMH'
    parent: YX
  YXD:
    name: 'Children’s / Teenage personal and social topics: Self-awareness and self-esteem'
    notes: 'Also class here: topics and advice about self-discovery, self-knowledge, self-worth, self-image, self-identity,
      self-reliance, building confidence'
    parent: YX
  YXE:
    name: 'Children’s / Teenage personal and social topics: Emotions, moods, feelings and behaviours'
    notes: 'Use for: general titles about emotions or titles that deal with multiple emotions. Use all YXE* codes for: titles
      that deal with several or various emotions, what they are, how to recognise them, how to deal with them, or understand
      them, express them, or encourage them'
    parent: YX
  YXEB:
    name: 'Children’s / Teenage emotions: Anger, frustration'
    notes: 'Also class here: coping with anger, disgust, hostility, jealousy, selfishness, feeling grumpy, tantrums, bad temper
      or mood, rage'
    parent: YXE
  YXED:
    name: 'Children’s / Teenage emotions: Sadness, unhappiness, disappointment'
    notes: 'Also class here: gloominess, emotional pain or suffering'
    parent: YXE
  YXEF:
    name: 'Children’s / Teenage emotions: Worry, fear'
    notes: 'Also class here: feeling worried or anxious, dealing with worries, distress, uncertainty, stress, fear, separation
      anxiety, shame, embarrassment'
    parent: YXE
  YXEH:
    name: 'Children’s / Teenage emotions: Loneliness, isolation'
    notes: 'Also class here: feeling like an outsider or a loner, feeling alone or lonely, feeling alienated'
    parent: YXE
  YXEJ:
    name: 'Children’s / Teenage emotions: Compassion, empathy, kindness'
    notes: 'Also class here: accepting differences, solidarity with or compassion for others, courtesy, generosity, tolerance,
      love and understanding'
    parent: YXE
  YXEL:
    name: 'Children’s / Teenage emotions: Courage, bravery, hope'
    notes: 'Also class here: heroism, perseverance, persistence, loyalty, trust, honesty'
    parent: YXE
  YXEN:
    name: 'Children’s / Teenage emotions: Happiness, joy'
    notes: 'Also class here: pleasure, cheerfulness, contentment, gladness, delight, excitement, optimism, gratitude, thankfulness,
      optimism, mirth, elation, or just being happy'
    parent: YXE
  YXET:
    name: 'Children’s / Teenage emotions: Mischief and mischievous behaviour'
    notes: 'Also class here: Being naughty, misbehaving, prankish, teasing, getting into trouble. Use for: works about causing
      or showing a fondness for causing trouble in a playful way, works that show the consequences of misbehaviour, or works
      where being naughty is a key theme'
    parent: YXE
  YXF:
    name: 'Children’s / Teenage personal and social topics: Families and family members'
    notes: 'Also class here: aunts, uncles, cousins, family life, multigenerational families, kinship groups, relatives, blended
      families, extended family members, stepfamilies or any type of family etc. Use for: works about families, issues in
      families, particular members of a family, etc. Use with: 5PHA* qualifiers'
    parent: YX
  YXFB:
    name: 'Children’s / Teenage personal and social topics: Parents'
    notes: 'Also class here: mothers, fathers, single-parents, step-parents'
    parent: YXF
  YXFC:
    name: 'Children’s / Teenage personal and social topics: Grandparents'
    notes: 'Also class here: Grandmothers, grandfathers, grandparents and their grandchildren'
    parent: YXF
  YXFD:
    name: 'Children’s / Teenage personal and social topics: Divorce, separation, family break-up'
    parent: YXF
  YXFF:
    name: 'Children’s / Teenage personal and social topics: Adoption / fostering'
    notes: 'Also class here: orphans'
    parent: YXF
  YXFR:
    name: 'Children’s / Teenage personal and social topics: Siblings'
    notes: 'Also class here: brothers, sisters, step and half brothers and sisters'
    parent: YXF
  YXFS:
    name: 'Children’s / Teenage personal and social topics: New baby'
    notes: 'Also class here: new brother, new sister, new sibling, or titles about babies'
    parent: YXF
  YXG:
    name: 'Children’s / Teenage personal and social topics: Death and grief'
    notes: 'Also class here: loss, dying, bereavement, mourning, works explaining death, how and why people die, end of life,
      etc'
    parent: YX
  YXGS:
    name: 'Children’s / Teenage personal and social topics: Suicide'
    notes: 'Also class here: getting help or dealing with suicidal ideation or thoughts, helping understand when someone commits
      suicide, suicide prevention, advice for talking about suicide. Use with: 5JB for material specifically created for or
      aimed at young men or boys, 5JA for material specifically created for or aimed at young women or girls, 5PS*, 5PT for
      works aimed at LGBTQIA+ youth, or other 5P* qualifiers for works relating to specific groups, or 5L* for works about
      specific age groups, for example, 5LFE for works about older teenagers, 5PHA* codes when discussing family members,
      etc'
    parent: YXG
  YXH:
    name: 'Children’s / Teenage personal and social topics: Relationships (non-family / groups)'
    notes: 'Use for: relationships within peer or social groups, interpersonal relationships, frenemies, cliques, gangs, learning
      about relationships, skills for interaction with others outside families and other relationship topics, relationships
      with adults from a young persons perspective, dealing with the adult world, etc'
    parent: YX
  YXHB:
    name: 'Children’s / Teenage personal and social topics: Friends and friendships'
    notes: 'Also class here: making new friends, friendship groups, found family, issues around relationships with friends,
      such as conformity, popularity or isolation within a group of friends, end of friendships, advice about making friends,
      etc, See also: YFM'
    parent: YXH
  YXHL:
    name: 'Children’s / Teenage personal and social topics: Dating, relationships, romance and love'
    notes: 'Also class here: topics like first attraction, being in a couple, advice about romantic relationships, dating
      for the first time, first love, unrequited love, also advice about boundaries, consent and intimacy in a romantic relationship,
      kissing, advice for breaking up, ending a relationship, problems in relationships'
    parent: YXH
  YXHP:
    name: 'Children’s / Teenage personal and social topics: Life skills and choices'
    notes: 'Also class here: manners, behaviour, dilemmas, consequences, responsibilities, skills for interacting with modern
      life, other people, following or not following rules, getting into trouble, taking responsibility for actions, assuming
      the consequences, not using violence, not hitting, kicking or biting, etc'
    parent: YXH
  YXHY:
    name: 'Children’s / Teenage personal and social topics: Teenage pregnancy'
    notes: 'Also class here: teenage parenthood, teenage mums and dads. Use for: works aimed at young people explaining pregnancy,
      birth, parenthood or topics around being a young mother or father'
    parent: YXH
  YXJ:
    name: 'Children’s / Teenage personal and social topics: Drugs and addiction'
    notes: 'Also class here: topics around substance addiction, alcohol abuse, etc'
    parent: YX
  YXK:
    name: 'Children’s / Teenage personal and social topics: Disability, impairments and special needs'
    notes: 'Also class here: physical disabilities and impairments, visible or invisible disabilities or conditions, wheelchair
      users, etc. Use with: 5PM* Qualifiers as appropriate'
    parent: YX
  YXL:
    name: 'Children’s / Teenage personal and social topics: Physical and mental health conditions'
    notes: 'Use all YXL* codes for: titles aimed either at young people who have a particular condition or to help understand
      others who have a particular condition. Use all YXL* codes with: 5PM* Qualifiers as appropriate. NB: YXL* codes may
      be used with V* codes when there is no specific Y* code or qualifier but if mixing YXL* codes with V* codes, the YXL*
      code or another Y* code must be designated as the Main Subject and sent with a 5A* qualifier'
    parent: YX
  YXLB:
    name: 'Children’s / Teenage personal and social topics: Illness and specific physical health conditions'
    notes: 'Also class here: living with disease and long-term physical conditions, injuries, first aid, medicine, titles
      that explain specific illnesses, diseases, etc to young people. Use with: YNH for history of medicine, plagues and disease
      in the past, histories of pandemics and epidemics, etc'
    parent: YXL
  YXLB1:
    name: 'Children’s / Teenage personal and social topics: Cancer'
    parent: YXLB
  YXLD:
    name: 'Children’s / Teenage personal and social topics: Mental health and mental wellbeing'
    notes: 'Also class here: mental disorders, trauma and traumatic experiences. Use for: works that help children or teenagers
      deal with mental health, personal trauma or traumatic events around them, how to process or talk about trauma, with
      adverse childhood experiences, advice about good mental health and wellbeing'
    parent: YXL
  YXLD1:
    name: 'Children’s / Teenage personal and social topics: Eating disorders and body image'
    notes: 'Also class here: ARFID, anorexia, bulimia, binge eating, body dysmorphia, purging disorder, disordered eating,
      advice about body acceptance, body positivity, body neutrality'
    parent: YXLD
  YXLD2:
    name: 'Children’s / Teenage personal and social topics: Anxiety, depression and self-harm'
    notes: 'Also class here: panic attacks, severe stress'
    parent: YXLD
  YXLD6:
    name: 'Children’s / Teenage personal and social topics: Positive / good mental health'
    notes: 'Also class here: positive self-image, well-being. Use for: works that explain, help or give advice about good
      mental health and wellness, about judging life positively and feeling good, positive wellbeing, positive images'
    parent: YXLD
  YXM:
    name: 'Children’s / Teenage personal and social topics: Multicultural'
    notes: 'Use for: works on social and cultural topics linked to multiculturalism, pluriculturalism, biculturalism and multicultural,
      pluricultural or bicultural societies'
    parent: YX
  YXN:
    name: 'Children’s / Teenage personal and social topics: Racism and anti-racism'
    notes: 'Also class here: xenophobia, race relations. Use for: works about discrimination and prejudice based on skin colour,
      race or ethnic origin, or prejudices based on the perception that someone is foreign or from outside the community,
      and issues of inequality and discrimination, as well as measures to address racism. Use with: YNH for historical topics,
      See also: JBFA1'
    parent: YX
  YXP:
    name: 'Children’s / Teenage personal and social topics: Diversity, equality, equity and inclusion'
    notes: 'Use for: books that deal with these topics and stories with a particularly diverse cast of characters, or which
      illustrate accessibility, social justice, equity, diversity, or inclusivity (DEI) within the context of the story without
      necessarily being the subject of the story. Use with: YF* codes for stories and values from 5P* INTEREST Qualifiers
      as appropriate'
    parent: YX
  YXPB:
    name: 'Children’s / Teenage personal and social topics: Prejudice and intolerance'
    notes: 'Also class here: discrimination, injustice, the judgements of others. Use with: YNH for historical topics'
    parent: YXP
  YXQ:
    name: 'Children’s / Teenage personal and social topics: Bullying, violence, abuse and peer pressure'
    notes: 'Also class here: use of violent or abusive language. Use for: works that explore these topics, often titles aimed
      at explaining or helping young people understand or deal with these topics. Use with: YF* when it is the major element
      of the story'
    parent: YX
  YXQD:
    name: 'Children’s / Teenage personal and social topics: Abuse / exploitation'
    notes: 'Also class here: physical, mental, emotional or sexual abuse, coercive control, domestic abuse, or works aimed
      at young people about criminal exploitation, debt bondage, exploitation of vulnerable children by criminal gangs'
    parent: YXQ
  YXQF:
    name: 'Children’s / Teenage personal and social topics: Bullying and harassment'
    notes: 'Also class here: online trolling and bullying, coercion, cyberbullying, cyberstalking, physical or verbal bullying
      or harassment, relational bullying, collective bullying or mobbing, bullies and accomplices, victims of bullying, effects
      of bullying and harassment, bystander effect, school bullying, victimisation'
    parent: YXQ
  YXQP:
    name: 'Children’s / Teenage personal and social topics: Violence'
    notes: 'Also class here: Knife violence, gun violence, bombs, violent acts, acts of terrorism, kidnapping, violent threats,
      violent rampages. Use for: works aimed at young people dealing with physical violence or conflict involving weapons,
      helping young people deal with knife crime, with gun violence, stabbings, shootings, violent gang crimes, school shootings,
      violence of war, for works helping young people avoid violence, or deal with the trauma of weapons related violence'
    parent: YXQ
  YXR:
    name: 'Children’s / Teenage personal and social topics: Personal safety'
    notes: 'Also class here: dealing with strangers, road safety, safety in the home etc. Use with: YXZE for titles about
      personal safety in the event of an emergency'
    parent: YX
  YXS:
    name: 'Children’s / Teenage personal and social topics: Runaways'
    notes: 'Also class here: fugitives, escapees. Use for: works that look at young people that run away and reasons around
      this, running away from home, or family or school or escaping things like repression, slavery, conflict, etc. Use with:
      YF* codes for stories about runaways, with YNB for biographies of runaways, or YNH for historical approaches, See also:
      YXZM'
    parent: YX
  YXT:
    name: 'Children’s / Teenage personal and social topics: School, education and teachers'
    notes: 'Use for: works that explore topics like starting school, attending school, going to a new school, school life,
      education topics, titles about teachers and educators, school librarians'
    parent: YX
  YXTB:
    name: 'Children’s / Teenage personal and social topics: Truancy and school problems'
    notes: 'Use for: works about issues at school, around repeated absence, non-attendance, avoiding school, etc'
    parent: YXT
  YXV:
    name: 'Teenage personal and social topics: Advice on careers and further education, leaving school'
    notes: 'Use for: titles about work, jobs, careers, professions aimed at a young audience but not educational, See also:
      YPJV2 YPWC9'
    parent: YX
  YXW:
    name: 'Children’s / Teenage personal and social topics: First / new experiences and life changes'
    notes: 'Also class here: Dealing with and understanding change, talking about change, changes or new experiences like
      moving home, living in a new town, starting a new school, making new friends, a new family, new siblings, etc. Use for:
      titles that explore or deal with major or significant new experiences or change in the life or world of a young person,
      how to deal or cope with this experience or change, or explains about these experiences or changes, from the perspective
      of the child or teenager etc. Use with: other Y* codes or qualifiers to give more details of the main theme or experience'
    parent: YX
  YXWP:
    name: 'Children’s / Teenage personal and social topics: Growing up / coming of age'
    notes: 'Use for: titles that deal with the changes from childhood or youth to adulthood, such as taking on adult responsibilities,
      career choices, character growth, gaining independence, self-reliance, moving away from home, going to university, first
      experience of love, etc. Use with: YF* for coming of age fiction, YXA* codes for works about changes to the body, or
      sex, YXHL for first love, etc'
    parent: YXW
  YXZ:
    name: 'Children’s / Teenage: Social issues / topics'
    notes: 'Also class here: social activism, general works on social justice. Use for: titles that deal directly with the
      topics or explain debates around social issues for young people. Use with: other YX* codes to give greater detail; YF*
      fiction codes for stories that are about these topics. NB: YXZ may be used with JBF* codes if there are no more precise
      Y* codes but if mixing YXZ with JBF* codes, a Y* code MUST be designated as the Main Subject and sent with a 5A* qualifier'
    parent: YX
  YXZB:
    name: 'Children’s / Teenage social topics: Activism / activists'
    notes: 'Use for: titles about social activism, environmental activism, human rights, social or civil rights movements,
      causes and other forms of engagement as activists by young people, volunteering or volunteer engagement. Use with: other
      YN* or YX* codes to give greater detail and with YNB for biographies of activists'
    parent: YXZ
  YXZC:
    name: 'Children’s / Teenage social topics: Identity / belonging'
    notes: 'Use for: titles that explore topics or themes around notions of identity and belonging, as individuals or as part
      of a particular group or communities, identity or belonging based on relationship to a place, based on a shared culture
      or heritage or other works that explore the notion of identity or belonging for children or teenagers'
    parent: YXZ
  YXZD:
    name: 'Children’s / Teenage social topics: Peace / reconciliation'
    notes: 'Use for: works for young people about peace after conflict, maintaining peace, ideas for creating, keeping, spreading
      peace and peaceful actions, resolving conflict, themes and topics around reconciliation between different groups or
      persons'
    parent: YXZ
  YXZE:
    name: 'Children’s / Teenage social topics: Accidents, disasters or emergencies'
    notes: 'Use for: either works about the impact or consequences, on both people and society, of both natural and human-made
      disasters and accidents; things such as diseases, plagues, epidemics, pandemics, famine, malnutrition, volcanic explosions,
      earthquakes, extreme-weather, floods, forced movement of peoples as a result of disasters; or works about accidents
      like fires, crashes, shipwrecks, maritime and air disasters or accidents, rail or road accidents, explosions, oil spills,
      getting trapped or lost, etc; or for titles that explain how to prepare for disasters, emergencies, etc for example,
      what to do during an earthquake, or major fire or tsunami'
    parent: YXZ
  YXZF:
    name: 'Children’s / Teenage social topics: Fame, celebrity, fandom'
    notes: 'Use for: works for young people about fame, celebrity, being famous, the search for fame and the issues with being
      famous or a celebrity, being an idol, being glamorous or wealthy, or works about being a fan or fandom'
    parent: YXZ
  YXZG:
    name: 'Children’s / Teenage social topics: Environment, sustainability and green issues'
    notes: 'Also class here: looking after our planet, climate change, pollution, rubbish, plastics, recycling, climate emergency,
      climate strikes, environmental champions, looking after our future, protecting nature, conservation, water use and conservation,
      managing natural resources, sustainable solutions, reducing consumption and use of resources. Use for: works that look
      at these topics and also ones that have ideas for solutions, or what young people can do themselves'
    parent: YXZ
  YXZH:
    name: 'Children’s / Teenage: Social topics: Poverty / precarity'
    notes: 'Use for: works that look at social issues topics in society around social instability, deprivation and hardship,
      homelessness, the unhoused, hunger, economically disadvantaged, food poverty, etc'
    parent: YXZ
  YXZM:
    name: 'Children’s / Teenage social topics: Migration / refugees'
    notes: 'Also class here: asylum seekers, immigrants and immigration, emigrants and emigration, displacement, exile, forced
      journeys or relocation, diasporas. Use with: YNH for history titles or YNB for biographies, YF* for stories and INTEREST
      5P* qualifiers as appropriate'
    parent: YXZ
  YXZR:
    name: 'Children’s / Teenage social topics: Religious issues / debates'
    notes: 'Use for: titles that look at discussions, debates, topics, controversies, or other issues related to religion,
      belief, faith, religious identity, etc. Use with: YNR* or other Y* codes and 5PG* INTEREST qualifiers as appropriate'
    parent: YXZ
  YXZW:
    name: 'Children’s / Teenage social topics: War and conflict issues'
    parent: YXZ
  YZ:
    name: Children’s / Teenage stationery and miscellaneous items
    notes: 'Use for: Book accessories, gift items and merchandise, non-book products in the book supply chain or identifying
      a non-book product that has no particular theme or topic and is clearly content free but still needs to be classified
      as something. Use all YZ* codes for: products such as stationery and non-book articles for children or adolescents that
      would not be categorised using another Y* subject category as a primary or main subject. Use with: other subject codes
      as appropriate but YZ* should be the main or principal code. NB: more details of the type non-book product should be
      sent in other metadata'
    parent: Y
  YZG:
    name: 'Children’s / Teenage: Gift and novelty books / items'
    notes: 'Use for: novelty products or books, typically small format and of a decorative, humorous or inspirational nature,
      often intended to be given as one-off gifts to children or teenagers or for novelty products that do NOT easily fit
      into other sections and are often displayed at point of sale. DO NOT USE: for marketing purposes indicating a title
      would make a good gift, (all books make good gifts!)'
    parent: YZ
  YZP:
    name: 'Children’s / Teenage: Miscellaneous non-book items: Games, puzzles or toys'
    notes: 'Also class here: Board games, travel-games, strategy games, jigsaw puzzles, 3-D puzzles classic games, family
      games, card games, educational games and toys, book related toys, figurines and action figures, soft toys, etc. Use
      for: any type of non-book game or puzzle sold separately from books. Use with: other codes to indicate the subject or
      theme of the game or puzzle. NB: Details of formats and types of games are conveyed in other product metadata'
    parent: YZ
  YZS:
    name: 'Children’s / Teenage: Stationery items,'
    notes: 'Also class here: any printed stationery item, posters, kits, postcard packs, bookmarks, etc intended for children
      or teenagers. Use with: another code indicating subject where possible., See also: WZS'
    parent: YZ
  YZSD:
    name: 'Children’s / Teenage: Printed stationery items: Calendars / diaries'
    notes: 'Also class here: printed agendas, annual planners, academic year diaries and planners. Use with: other codes to
      indicate the subject or theme of the calendar or diary. NB: Details of formats and types of calendars or diaries are
      conveyed in other product metadata'
    parent: YZS
  YZSG:
    name: 'Children’s / Teenage stationery items: Thematic and guided journals and notebooks'
    notes: 'Also class here: creative journals, planners, journals or albums to record information about special events. Use
      for: journals that you fill in, which have some pre-printed text or images to inspire what to write or note down, or
      entries with a prompt or prompts to write about a particular aspect of your life, but are not linked to a particular
      year. Use with: another secondary code indicating a subject as appropriate, and 5H* qualifiers if for an event'
    parent: YZS
  YZSN:
    name: 'Children’s / Teenage: Blank stationery items'
    notes: 'Also class here: blank exercise books, autograph books, scrapbooks and other content-free items for children or
      teenagers, See also: WZSN'
    parent: YZS
  YZSP:
    name: 'Children’s / Teenage: Stationery items: art and craft supplies'
    notes: 'Also class here: paints, crayons, crafting kits, stamp kits, painting sets, pens, pencils, brushes'
    parent: YZS
