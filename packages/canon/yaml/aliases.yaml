# Raw phrase → canonical code map.
# - Subject codes resolve against thema_subjects.yaml OR extensions.yaml (LOCAL:*).
# - Audience codes resolve against thema_audience.yaml.
# - Form codes resolve against thema_form.yaml OR extensions.yaml.
# - Hard-no codes resolve against hard_nos.yaml.
# Keys are normalized at runtime (lowercase, punctuation stripped, whitespace collapsed)
# before lookup — so "Sci-Fi", "sci fi", "SCIFI" all hit the "sci fi" entry.
# Do not add a phrase under more than one facet.

