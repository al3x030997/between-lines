# Thema 5A* audience qualifiers (interest age)
# Source: EDItEUR Thema v1.6 (2025-04-10 English release).
# Do not edit by hand — regenerate via canon/_source/filter_thema.py.
# Local (non-Thema) additions live in canon/extensions.yaml.

codes:
  5A:
    name: Interest age / level (Content adapted or suitable for this age and above)
    notes: 'Use all 5A* age codes for: defining the Y* or X* codes – 5A* age numbers are used instead of named codes, such
      as juvenile, middle grade, young adult, as these have different meanings in different countries or languages. Select
      one 5A* code indicating a general guideline starting or base interest age of the content in any works aimed primarily
      at children or teenagers. All Y* codes (except YP* which use 4* codes) MUST be accompanied by one 5A* qualifier code
      to give guidance of interest age, for example: book content for an audience of 9 to 12 age group, should use 5AK, as
      the lower age; content of interest to teenagers should use 5AP or 5AQ; content for older teenagers and young adults
      should use 5AS, 5AT or 5AU as appropriate. 5AR, 5AX and 5AZ can be used with any relevant subject code. All 5A* codes
      can be used with X* subject codes if the Comic book is aimed at children or teenagers. DO NOT USE: 5A itself – always
      use 5A* codes. NB: Greater detail of age range, reading age, interest age etc would be communicated in other metadata'
    parent: 5
