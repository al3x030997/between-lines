  5AR:
    name: Content adapted or suitable for reluctant or struggling readers (children / teenagers)
    notes: 'Also class here: High-low readers, Hi-Lo content aimed at children or teenagers. Use for: books that are specially
      written for or considered suitable for young people who do not want to read, have difficulty reading, or are struggling
      to read. Usually these books will have a higher interest age and a lower reading age. Content is usually aimed at a
      particular interest age but the language used is purposefully slightly simpler than most average content aimed at the
      same interest age in that language, so that it is easier to read or listen to than other titles. These are often titles
      in specific named collections and will often have notions of levels of difficulty associated with them by the publisher
      and / or may be accompanied by indications of complexity. Use with: one other 5A* Interest age qualifier. Prefer: 5AX
      for reluctant adult readers or 5AZ for accessible content and 4L codes for second language titles, See also: 5AX 5AZ
      4L*'
    parent: 5A
  5AS:
    name: 'Interest age: from c 15 years'
    parent: 5A
  5AT:
    name: 'Interest age: from c 16 years'
    parent: 5A
  5AU:
    name: 'Interest age: from c 17 years'
    parent: 5A
  5AV:
    name: 'Interest age: from c 17 years to c 29 years'
    notes: 'Use for: works aimed specifically at older teens and young adults in their 20s, those who are newly adult, emerging
      adulthood. This age group may be referred to in some places as young adults or sometimes as new adults. The content
      is specifically created for and about this group but can also appeal to other groups as well. Prefer: 5LKE for titles
      about this age group. DO NOT USE: with Y* codes, See also: 5LKE'
    parent: 5A
  5AX:
    name: Content adapted or suitable for adult emergent / reluctant readers
    notes: 'Also class here: High-low readers, Hi-Lo content aimed at adults. Use for: books that are specifically aimed at
      adult literacy or helping adult readers with reading difficulties or books that are suitable for adult readers who are
      not confident in their reading abilities or suitable for the newly literate. Content is aimed at adult interests but
      the language used is purposefully slightly simpler than most average content aimed at adults so that it is easier to
      read or listen to than other titles'
    parent: 5A
  5AZ:
    name: Content adapted or suitable for people with learning / communication difficulties or impairments
    notes: 'Use for: indicating works where the content is specifically adapted for, or purposefully written for, or aimed
      at people, regardless of age, with special or additional needs, who may have difficulty in accessing or reading the
      content of most titles. This could include content specifically adapted for people with, for example, dyslexia and other
      reading or learning disabilities, cognitive impairments or disorders, memory disorders, dementia or Alzheimer’s, visual
      or other sensory impairments, profound and multiple learning disabilities, etc. Use with: 5PM* Qualifiers as appropriate'
    parent: 5A
